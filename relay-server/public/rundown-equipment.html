<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Equipment Status — Tally</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0F0D;
      --surface: #111916;
      --surface2: #19221E;
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(0,230,118,0.4);
      --text: #F0F2F4;
      --text-muted: #8B9DAF;
      --text-dim: #556270;
      --green: #00E676;
      --green-bg: rgba(0,230,118,0.12);
      --red: #FF5252;
      --red-bg: rgba(255,82,82,0.12);
      --amber: #FFB74D;
      --amber-bg: rgba(255,183,77,0.12);
      --blue: #42A5F5;
      --blue-bg: rgba(66,165,245,0.10);
      --section-bg: rgba(0,230,118,0.06);
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo {
      width: 24px;
      height: 24px;
      background: var(--green);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-logo svg { width: 14px; height: 14px; }

    .plan-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }

    .plan-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .connection-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .connection-badge.online {
      background: var(--green-bg);
      color: var(--green);
    }

    .connection-badge.offline {
      background: var(--red-bg);
      color: var(--red);
    }

    .live-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--red-bg);
      color: var(--red);
    }

    .live-badge.visible { display: inline-flex; }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Main content: split layout ── */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .rundown-panel {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .equipment-panel {
      width: 380px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 16px;
    }

    /* ── Rundown list ── */
    .rundown-header {
      padding: 12px 16px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 800;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .cue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: default;
    }

    .cue-item:hover { background: rgba(255,255,255,0.02); }

    .cue-item.active {
      background: var(--green-bg);
      border-left: 3px solid var(--green);
    }

    .cue-item.completed { opacity: 0.45; }

    .cue-item.section {
      background: var(--section-bg);
      padding: 8px 16px;
    }

    .cue-index {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .cue-item.active .cue-index { color: var(--green); }

    .cue-body { flex: 1; min-width: 0; }

    .cue-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cue-item.section .cue-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 800;
      color: var(--green);
    }

    .cue-assignee {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .cue-duration {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .cue-item.active .cue-duration { color: var(--green); }

    /* ── Equipment cards ── */
    .equip-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 800;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .equip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 12px;
    }

    .equip-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .equip-card-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .equip-card-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      color: var(--text-dim);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .status-pill.green { background: var(--green-bg); color: var(--green); }
    .status-pill.red { background: var(--red-bg); color: var(--red); }
    .status-pill.amber { background: var(--amber-bg); color: var(--amber); }
    .status-pill.blue { background: var(--blue-bg); color: var(--blue); }

    .equip-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .equip-stat {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 8px 10px;
    }

    .equip-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .equip-stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .equip-stat-value.green { color: var(--green); }
    .equip-stat-value.red { color: var(--red); }
    .equip-stat-value.amber { color: var(--amber); }

    /* ── Stream verification ── */
    .stream-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 12px;
    }

    .stream-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
    }

    .stream-row + .stream-row { border-top: 1px solid var(--border); }

    .stream-platform {
      font-size: 13px;
      font-weight: 600;
    }

    .stream-viewers {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Audio monitoring ── */
    .audio-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: var(--surface2);
      border-radius: var(--radius);
      margin-top: 4px;
    }

    .audio-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Empty / error states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 40px;
    }

    .error-page h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .error-page p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 360px;
      line-height: 1.5;
    }

    /* ── Updated timestamp ── */
    .last-updated {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      padding: 8px;
      margin-top: 8px;
    }

    /* ── Responsive: stack on mobile ── */
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }

      .rundown-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }

      .equipment-panel {
        width: 100%;
        flex-shrink: 1;
      }
    }
  </style>
</head>
<body>

<div id="app-root" class="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0A0F0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <div>
        <div class="plan-title" id="plan-title">Loading...</div>
        <div class="plan-date" id="plan-date"></div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="live-badge" id="live-badge"><span class="live-dot"></span> Live</span>
      <span class="connection-badge offline" id="connection-badge">Offline</span>
    </div>
  </div>

  <div class="main-content">
    <div class="rundown-panel">
      <div class="rundown-header">Rundown</div>
      <div id="cue-list"></div>
    </div>
    <div class="equipment-panel">
      <div class="equip-section-title">Equipment Status</div>
      <div id="equipment-list">
        <div class="empty-state">
          <p>Waiting for equipment data...</p>
        </div>
      </div>
      <div id="stream-section" style="display:none">
        <div class="equip-section-title" style="margin-top:16px">Stream Destinations</div>
        <div id="stream-list"></div>
      </div>
      <div id="audio-section" style="display:none">
        <div class="equip-section-title" style="margin-top:16px">Audio</div>
        <div id="audio-status"></div>
      </div>
      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>
</div>

<div id="error-root" class="error-page" style="display:none">
  <h1 id="error-title">Error</h1>
  <p id="error-message"></p>
</div>

<script>
(function() {
  'use strict';

  var token = location.pathname.split('/').pop();
  var apiBase = location.origin;
  var plan = null;
  var items = [];
  var liveState = null;
  var equipmentData = null;
  var planPollTimer = null;
  var equipPollTimer = null;

  // ── Helpers ──

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatDuration(seconds) {
    if (!seconds || seconds <= 0) return '';
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function apiGet(path) {
    return fetch(apiBase + path).then(function(r) {
      if (!r.ok) throw { status: r.status, message: 'Request failed' };
      return r.json();
    });
  }

  // ── Error display ──

  function showError(title, message) {
    document.getElementById('app-root').style.display = 'none';
    var root = document.getElementById('error-root');
    root.style.display = '';
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-message').textContent = message || '';
  }

  // ── Load plan data ──

  function loadPlan() {
    return apiGet('/api/public/rundown/' + encodeURIComponent(token))
      .then(function(data) {
        plan = data;
        items = data.items || [];
        liveState = data.liveState || { isLive: false, currentCueIndex: -1 };
        document.getElementById('plan-title').textContent = data.title || 'Untitled';
        document.title = (data.title || 'Rundown') + ' — Equipment — Tally';
        if (data.serviceDate) {
          var d = new Date(data.serviceDate + 'T00:00:00');
          document.getElementById('plan-date').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        renderCueList();
        return data;
      });
  }

  // ── Poll live state ──

  function pollLiveState() {
    apiGet('/api/public/rundown/' + encodeURIComponent(token) + '/timer')
      .then(function(timer) {
        if (!timer) return;
        var badge = document.getElementById('live-badge');
        if (timer.is_live) {
          liveState = {
            isLive: true,
            currentCueIndex: timer.cue_index != null ? timer.cue_index : -1,
          };
          badge.classList.add('visible');
        } else {
          liveState = { isLive: false, currentCueIndex: -1 };
          badge.classList.remove('visible');
        }
        renderCueList();
      })
      .catch(function() { /* silent */ });
  }

  // ── Load equipment status ──

  function loadEquipment() {
    apiGet('/api/public/rundown/' + encodeURIComponent(token) + '/equipment')
      .then(function(data) {
        equipmentData = data;
        renderEquipment();
        renderConnectionBadge();
      })
      .catch(function() { /* silent */ });
  }

  // ── Render cue list ──

  function renderCueList() {
    var container = document.getElementById('cue-list');
    if (!items.length) {
      container.innerHTML = '<div class="empty-state"><p>No cues in this rundown.</p></div>';
      return;
    }
    var html = '';
    var cueNum = 0;
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var isSection = item.itemType === 'section';
      var isCurrent = liveState && liveState.isLive && liveState.currentCueIndex === i;
      var isCompleted = liveState && liveState.isLive && liveState.currentCueIndex > i;
      var cls = 'cue-item';
      if (isSection) cls += ' section';
      if (isCurrent) cls += ' active';
      if (isCompleted && !isSection) cls += ' completed';

      if (!isSection) cueNum++;

      html += '<div class="' + cls + '" data-index="' + i + '">';
      html += '<div class="cue-index">' + (isSection ? '' : cueNum) + '</div>';
      html += '<div class="cue-body">';
      html += '<div class="cue-title">' + esc(item.title || 'Untitled') + '</div>';
      if (item.assignee) html += '<div class="cue-assignee">' + esc(item.assignee) + '</div>';
      html += '</div>';
      if (!isSection && item.lengthSeconds) {
        html += '<div class="cue-duration">' + formatDuration(item.lengthSeconds) + '</div>';
      }
      html += '</div>';
    }
    container.innerHTML = html;

    // Scroll active into view
    if (liveState && liveState.isLive && liveState.currentCueIndex >= 0) {
      var active = container.querySelector('.cue-item.active');
      if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // ── Render connection badge ──

  function renderConnectionBadge() {
    var badge = document.getElementById('connection-badge');
    if (equipmentData && equipmentData.connected) {
      badge.textContent = 'Online';
      badge.className = 'connection-badge online';
    } else {
      badge.textContent = 'Offline';
      badge.className = 'connection-badge offline';
    }
  }

  // ── Render equipment panel ──

  function renderEquipment() {
    if (!equipmentData) return;

    var devices = equipmentData.devices || [];
    var container = document.getElementById('equipment-list');

    if (!devices.length && !equipmentData.connected) {
      container.innerHTML = '<div class="empty-state"><p>No equipment connected. Start the TallyConnect desktop app to see live device status.</p></div>';
      renderStreams();
      renderAudio();
      renderLastUpdated();
      return;
    }

    if (!devices.length) {
      container.innerHTML = '<div class="empty-state"><p>No devices detected. Check your equipment connections in the TallyConnect app.</p></div>';
      renderStreams();
      renderAudio();
      renderLastUpdated();
      return;
    }

    var html = '';
    for (var i = 0; i < devices.length; i++) {
      html += buildDeviceCard(devices[i]);
    }
    container.innerHTML = html;

    renderStreams();
    renderAudio();
    renderLastUpdated();
  }

  function buildDeviceCard(device) {
    var html = '<div class="equip-card">';
    html += '<div class="equip-card-header">';
    html += '<div>';
    html += '<div class="equip-card-label">' + esc(device.label) + '</div>';
    html += '<div class="equip-card-type">' + esc(device.type) + '</div>';
    html += '</div>';

    // Connection status pill
    if (device.connected === false) {
      html += '<span class="status-pill red">Disconnected</span>';
    } else {
      html += '<span class="status-pill green">Connected</span>';
    }
    html += '</div>';

    // Stats grid
    html += '<div class="equip-stats">';

    if (device.type === 'atem') {
      html += buildStat('Program', device.programInput != null ? 'Input ' + device.programInput : '--', 'green');
      html += buildStat('Preview', device.previewInput != null ? 'Input ' + device.previewInput : '--', 'blue');
      html += buildStatPill('Streaming', device.streaming);
      html += buildStatPill('Recording', device.recording);
      if (device.streamingBitrate > 0) {
        html += buildStat('Bitrate', Math.round(device.streamingBitrate / 1000) + ' Kbps', '');
      }
      if (device.model) {
        html += buildStat('Model', device.model, '');
      }
    }

    if (device.type === 'obs') {
      html += buildStatPill('Streaming', device.streaming);
      html += buildStatPill('Recording', device.recording);
      if (device.bitrate > 0) html += buildStat('Bitrate', device.bitrate + ' Kbps', '');
      if (device.fps > 0) html += buildStat('FPS', device.fps.toFixed(1), '');
      if (device.version) html += buildStat('Version', device.version, '');
    }

    if (device.type === 'vmix') {
      html += buildStatPill('Streaming', device.streaming);
      html += buildStatPill('Recording', device.recording);
      if (device.version) html += buildStat('Version', device.version, '');
    }

    if (device.type === 'encoder') {
      html += buildStatPill('Live', device.live || device.streaming);
      if (device.bitrateKbps > 0) html += buildStat('Bitrate', device.bitrateKbps + ' Kbps', '');
      if (device.fps > 0) html += buildStat('FPS', device.fps.toFixed(1), '');
      if (device.encoderType) html += buildStat('Type', device.encoderType, '');
    }

    if (device.type === 'hyperdeck') {
      html += buildStatPill('Recording', device.recording);
      if (device.deckCount > 1) html += buildStat('Decks', device.deckCount, '');
    }

    if (device.type === 'mixer') {
      html += buildStatPill('Main Muted', device.mainMuted, true);
      if (device.mixerType) html += buildStat('Type', device.mixerType, '');
    }

    if (device.type === 'propresenter') {
      html += buildStat('Status', device.connected ? 'Connected' : 'Disconnected', device.connected ? 'green' : 'red');
    }

    html += '</div></div>';
    return html;
  }

  function buildStat(label, value, colorClass) {
    return '<div class="equip-stat">'
      + '<div class="equip-stat-label">' + esc(label) + '</div>'
      + '<div class="equip-stat-value' + (colorClass ? ' ' + colorClass : '') + '">' + esc(String(value)) + '</div>'
      + '</div>';
  }

  function buildStatPill(label, active, invertColor) {
    var isOn = !!active;
    var colorClass = invertColor ? (isOn ? 'red' : 'green') : (isOn ? 'green' : '');
    var text = isOn ? 'Active' : 'Off';
    return '<div class="equip-stat">'
      + '<div class="equip-stat-label">' + esc(label) + '</div>'
      + '<div class="equip-stat-value' + (colorClass ? ' ' + colorClass : '') + '">' + text + '</div>'
      + '</div>';
  }

  // ── Stream destinations ──

  function renderStreams() {
    var section = document.getElementById('stream-section');
    var container = document.getElementById('stream-list');
    if (!equipmentData || !equipmentData.streamVerification) {
      section.style.display = 'none';
      return;
    }
    var sv = equipmentData.streamVerification;
    var hasAny = sv.youtube || sv.facebook;
    if (!hasAny) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';
    var html = '<div class="stream-card">';

    if (sv.youtube) {
      html += '<div class="stream-row">';
      html += '<div class="stream-platform">YouTube</div>';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      if (sv.youtube.viewerCount != null) {
        html += '<span class="stream-viewers">' + sv.youtube.viewerCount.toLocaleString() + ' viewers</span>';
      }
      html += sv.youtube.live
        ? '<span class="status-pill green">Live</span>'
        : '<span class="status-pill red">Offline</span>';
      html += '</div></div>';
    }

    if (sv.facebook) {
      html += '<div class="stream-row">';
      html += '<div class="stream-platform">Facebook</div>';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      if (sv.facebook.viewerCount != null) {
        html += '<span class="stream-viewers">' + sv.facebook.viewerCount.toLocaleString() + ' viewers</span>';
      }
      html += sv.facebook.live
        ? '<span class="status-pill green">Live</span>'
        : '<span class="status-pill red">Offline</span>';
      html += '</div></div>';
    }

    html += '</div>';
    container.innerHTML = html;
  }

  // ── Audio monitoring ──

  function renderAudio() {
    var section = document.getElementById('audio-section');
    var container = document.getElementById('audio-status');
    if (!equipmentData || !equipmentData.audio) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';
    var audio = equipmentData.audio;
    var html = '<div class="audio-status">';

    if (audio.silenceDetected) {
      html += '<svg class="audio-icon" viewBox="0 0 24 24" fill="none" stroke="' + (audio.silenceDetected ? '#FF5252' : '#00E676') + '" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
      html += '<div><div style="font-size:13px;font-weight:700;color:var(--red)">Silence Detected</div><div style="font-size:11px;color:var(--text-muted)">No audio signal on monitored input</div></div>';
    } else if (audio.monitoring) {
      html += '<svg class="audio-icon" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
      html += '<div><div style="font-size:13px;font-weight:700;color:var(--green)">Audio OK</div><div style="font-size:11px;color:var(--text-muted)">Monitoring active, signal present</div></div>';
    } else {
      html += '<svg class="audio-icon" viewBox="0 0 24 24" fill="none" stroke="#556270" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>';
      html += '<div><div style="font-size:13px;font-weight:600;color:var(--text-dim)">Not Monitoring</div><div style="font-size:11px;color:var(--text-muted)">Audio monitoring is not active</div></div>';
    }

    html += '</div>';
    container.innerHTML = html;
  }

  // ── Last updated ──

  function renderLastUpdated() {
    var el = document.getElementById('last-updated');
    var now = new Date();
    el.textContent = 'Updated ' + now.toLocaleTimeString();
  }

  // ── Init ──

  function init() {
    loadPlan()
      .then(function() {
        document.getElementById('app-root').style.display = '';
        loadEquipment();
        // Poll live state every 2 seconds
        planPollTimer = setInterval(pollLiveState, 2000);
        // Poll equipment every 3 seconds
        equipPollTimer = setInterval(loadEquipment, 3000);
      })
      .catch(function(err) {
        if (err.status === 410) {
          showError('This rundown link has expired', 'Ask the service organizer to share a new link.');
        } else if (err.status === 404) {
          showError('Link not found', 'This link may be invalid or has been revoked.');
        } else {
          showError('Could not load rundown', err.message || 'An unexpected error occurred.');
        }
      });
  }

  init();
})();
</script>
</body>
</html>
