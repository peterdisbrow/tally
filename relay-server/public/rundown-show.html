<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Mode — Tally</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0F0D;
      --surface: #111916;
      --surface2: #19221E;
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(0,230,118,0.4);
      --text: #F0F2F4;
      --text-muted: #8B9DAF;
      --text-dim: #556270;
      --green: #00E676;
      --green-bg: rgba(0,230,118,0.12);
      --red: #FF5252;
      --red-bg: rgba(255,82,82,0.12);
      --amber: #FFB74D;
      --amber-bg: rgba(255,183,77,0.12);
      --blue: #42A5F5;
      --blue-bg: rgba(66,165,245,0.10);
      --section-bg: rgba(0,230,118,0.06);
      --radius: 10px;
      --radius-lg: 14px;
    }

    body.light-theme {
      --bg: #F5F7F5;
      --surface: #FFFFFF;
      --surface2: #F0F2F0;
      --border: rgba(0,0,0,0.10);
      --border-active: rgba(0,168,87,0.4);
      --text: #1A1D27;
      --text-muted: #4A5568;
      --text-dim: #718096;
      --green: #00A857;
      --green-bg: rgba(0,168,87,0.10);
      --red: #CC3333;
      --red-bg: rgba(204,51,51,0.10);
      --amber: #C47900;
      --amber-bg: rgba(196,121,0,0.10);
      --blue: #2B7CBD;
      --blue-bg: rgba(43,124,189,0.10);
      --section-bg: rgba(0,168,87,0.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo {
      width: 24px;
      height: 24px;
      background: var(--green);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-logo svg { width: 14px; height: 14px; }

    .plan-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }

    .plan-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .show-clock {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 6px;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-bar.is-live {
      border-bottom-color: var(--border-active);
    }

    .status-pills {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .pill-live {
      background: var(--green-bg);
      color: var(--green);
      animation: pulse-live 2s ease-in-out infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .pill-offline {
      background: var(--surface2);
      color: var(--text-dim);
    }

    .pill-elapsed {
      background: var(--blue-bg);
      color: var(--blue);
      font-family: ui-monospace, 'SF Mono', monospace;
    }

    .pill-remaining {
      background: var(--surface2);
      color: var(--text-muted);
      font-family: ui-monospace, 'SF Mono', monospace;
    }

    .pill-remaining.is-warning {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .pill-remaining.is-overtime {
      background: var(--red-bg);
      color: var(--red);
    }

    .cue-counter {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-go {
      background: var(--green);
      color: #0A0F0D;
      font-size: 16px;
      padding: 14px 40px;
      min-width: 160px;
      border-radius: var(--radius-lg);
    }

    .btn-go:hover:not(:disabled) { opacity: 0.9; }

    .btn-back {
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      padding: 14px 24px;
      border: 1px solid var(--border);
    }

    .btn-back:hover:not(:disabled) { background: rgba(255,255,255,0.08); }

    .btn-show {
      font-size: 12px;
      padding: 10px 18px;
    }

    .btn-start {
      background: var(--green);
      color: #0A0F0D;
    }

    .btn-start:hover:not(:disabled) { opacity: 0.9; }

    .btn-stop {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(255,82,82,0.3);
    }

    .btn-stop:hover:not(:disabled) { background: rgba(255,82,82,0.2); }

    /* ── Cue List ── */
    .cue-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: smooth;
    }

    .cue-item {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .cue-item:hover { background: rgba(255,255,255,0.02); }

    .cue-item.is-current {
      background: rgba(0,230,118,0.06);
      border-left: 3px solid var(--green);
      padding-left: 13px;
    }

    .cue-item.is-completed {
      opacity: 0.45;
    }

    .cue-item.is-section {
      grid-template-columns: 1fr;
      background: var(--section-bg);
      padding: 6px 16px;
      border-bottom: none;
      cursor: default;
    }

    .cue-item.is-section:hover { background: var(--section-bg); }

    .cue-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-align: center;
      padding-top: 2px;
    }

    .cue-item.is-current .cue-num {
      color: var(--green);
    }

    .cue-body {
      min-width: 0;
    }

    .cue-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .cue-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cue-item.is-section .cue-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--green);
    }

    .cue-type {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .cue-meta {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .cue-meta .assignee { color: var(--text-muted); }

    .cue-notes {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cue-item.is-current .cue-notes {
      -webkit-line-clamp: unset;
      color: var(--text-muted);
    }

    .cue-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-top: 4px;
    }

    .cue-col-chip {
      font-size: 11px;
      color: var(--text-dim);
    }

    .cue-col-chip .col-name {
      font-weight: 700;
      color: var(--text-dim);
      margin-right: 3px;
    }

    .cue-col-chip .col-val {
      color: var(--text-muted);
    }

    .cue-timing {
      text-align: right;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .cue-duration {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .cue-item.is-current .cue-duration {
      color: var(--green);
    }

    .cue-countdown {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 2px;
    }

    .cue-countdown.is-warning { color: var(--amber); }
    .cue-countdown.is-overtime { color: var(--red); }

    .cue-elapsed-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ── 10.5 Standby / Blackout cue types ── */
    .cue-item.is-standby {
      background: rgba(139,157,175,0.06);
      border-left: 3px solid #556270;
    }
    .cue-item.is-standby .cue-title { color: var(--text-muted); }
    .cue-item.is-standby .cue-type-badge {
      background: rgba(85,98,112,0.3);
      color: #8B9DAF;
    }
    .cue-item.is-blackout {
      background: rgba(0,0,0,0.45);
      border-left: 3px solid #1a1a1a;
    }
    .cue-item.is-blackout .cue-title { color: #556270; }
    .cue-item.is-blackout .cue-type-badge {
      background: rgba(0,0,0,0.6);
      color: #556270;
    }
    .cue-type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 1px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── 10.1 Cue stacks ── */
    .cue-item.is-child {
      padding-left: 32px;
      border-left: 2px solid rgba(255,255,255,0.06);
    }
    .cue-item.is-child.is-current {
      border-left-color: var(--green);
      padding-left: 29px;
    }
    .stack-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .stack-toggle:hover { color: var(--text-muted); background: rgba(255,255,255,0.04); }
    .stack-toggle svg { transition: transform 0.2s; }
    .stack-toggle.collapsed svg { transform: rotate(-90deg); }
    .cue-item.stack-child-hidden { display: none; }

    /* ── 10.6 Cue preview / arm panel ── */
    .preview-panel {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .preview-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .preview-panel-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
    }
    .btn-arm {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,183,77,0.3);
      background: rgba(255,183,77,0.08);
      color: var(--amber);
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-arm:hover { background: rgba(255,183,77,0.15); }
    .btn-arm.armed {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: var(--amber);
    }
    .preview-cue-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-equip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .preview-equip-chip {
      font-size: 11px;
      background: rgba(66,165,245,0.08);
      border: 1px solid rgba(66,165,245,0.2);
      color: var(--blue);
      padding: 3px 8px;
      border-radius: 5px;
    }
    .preview-equip-chip .chip-label { color: var(--text-dim); margin-right: 4px; }
    .preview-panel.is-armed {
      border-top-color: rgba(255,183,77,0.3);
      background: rgba(255,183,77,0.04);
    }

    /* ── 10.4 Validation warning count pill ── */
    .pill-warn {
      background: rgba(255,183,77,0.12);
      color: var(--amber);
      font-family: ui-monospace, 'SF Mono', monospace;
    .cue-est-start {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Next Up Preview ── */
    .next-up {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .next-up-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .next-up-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .next-up-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--surface2);
    }

    .next-up-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .next-up-dur {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Loading / Error ── */
    .state-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: 14px;
      color: var(--text-dim);
      padding: 40px 16px;
      text-align: center;
    }

    /* ── Inline Edit Modal ── */
    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .edit-overlay.open { display: flex; }

    .edit-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      width: 100%;
      max-width: 440px;
    }

    .edit-panel h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .edit-field {
      margin-bottom: 12px;
    }

    .edit-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .edit-field input,
    .edit-field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .edit-field input:focus,
    .edit-field textarea:focus {
      border-color: var(--green);
    }

    .edit-field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 16px;
      border: 1px solid var(--border);
    }

    .btn-save {
      background: var(--green);
      color: #0A0F0D;
      font-size: 13px;
      padding: 8px 16px;
    }

    /* ── Column Toggle ── */
    .col-toggle-wrap {
      position: relative;
    }

    .col-toggle-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .col-toggle-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.08);
    }

    .col-toggle-btn.active {
      color: var(--green);
      border-color: rgba(0,230,118,0.3);
    }

    .col-toggle-popover {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 50;
      width: min(260px, calc(100vw - 32px));
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      max-height: min(360px, calc(100vh - 80px));
      overflow-y: auto;
    }

    .col-toggle-popover.open { display: flex; }

    .col-toggle-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .col-toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .col-toggle-item:hover { background: rgba(255,255,255,0.04); }

    .col-toggle-check {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .col-toggle-item.checked .col-toggle-check {
      background: var(--green);
      border-color: var(--green);
    }

    .col-toggle-check svg { width: 10px; height: 10px; opacity: 0; }
    .col-toggle-item.checked .col-toggle-check svg { opacity: 1; }

    .col-toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .col-toggle-backdrop {
      position: fixed;
      inset: 0;
      z-index: 49;
      display: none;
    }

    .col-toggle-backdrop.open { display: block; }

    /* ── Styled Confirm Modal ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 16px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .confirm-panel h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .confirm-panel p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .confirm-actions .btn-cancel {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 13px;
      padding: 10px 20px;
      border: 1px solid var(--border);
    }
    .confirm-actions .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border: 1px solid rgba(255,82,82,0.3);
    }
    .confirm-actions .btn-danger:hover { background: rgba(255,82,82,0.2); }

    /* ── Connection Lost Banner ── */
    .connection-lost-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 8px 16px;
      background: linear-gradient(90deg, #FF5252, #FF7043);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      display: none;
      animation: banner-pulse 2s ease-in-out infinite;
    }
    .connection-lost-banner.visible { display: block; }
    @keyframes banner-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    /* ── 3.5 Landscape tablet layout (1024px) ── */
    @media (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
      .app {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .topbar {
        width: 100%;
        flex-shrink: 0;
      }
      .status-bar {
        width: 100%;
        flex-shrink: 0;
      }
      .controls {
        width: 100%;
        flex-shrink: 0;
      }
      .cue-list-wrap {
        width: 60%;
        flex: none;
        overflow-y: auto;
        border-right: 1px solid var(--border);
      }
      .next-up {
        width: 40%;
        flex: 1;
        position: sticky;
        top: 0;
        overflow-y: auto;
        max-height: calc(100vh - 160px);
        border-top: none;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      /* Persistent current cue + notes + timer panel on right side */
      .show-current-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: var(--radius-lg);
        background: var(--surface);
        border: 1px solid var(--border-active);
      }
    }

    /* Current cue panel: hidden by default, shown in landscape tablet */
    .show-current-panel { display: none; }

    /* ── 3.7 Compact status bar on narrow screens ── */
    .status-secondary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-expand-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    @media (max-width: 600px) {
      .status-secondary { display: none; }
      .status-secondary.expanded { display: flex; width: 100%; }
      .status-expand-btn { display: inline-flex; }
    }

    /* ── 3.6 GO/Back mobile layout ── */
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        gap: 8px;
        padding: 10px 12px;
      }
      .btn-go {
        font-size: 18px;
        padding: 16px 40px;
        min-width: 100%;
        border-radius: var(--radius-lg);
        order: -1;
      }
      .btn-back {
        font-size: 13px;
        padding: 10px 16px;
        min-width: 100%;
      }
      .btn-stop {
        min-width: 100%;
      }
      .btn-start {
        min-width: 100%;
      }
      .plan-title { max-width: 160px; }
      .cue-item { grid-template-columns: 28px 1fr auto; gap: 8px; padding: 8px 12px; }
      .cue-item.is-current { padding-left: 9px; }
      .cue-countdown { font-size: 16px; }
    }

    @media (max-width: 380px) {
      .topbar { padding: 10px 12px; }
      .status-bar { padding: 8px 12px; }
      .btn-go { padding: 14px 20px; }
    }
    /* ── v3: Keyboard Shortcuts Overlay ── */
    .shortcuts-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .shortcuts-overlay.open { display: flex; }
    .shortcuts-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 400px;
    }
    .shortcuts-panel h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .shortcut-row:last-child { border-bottom: none; }
    .shortcut-label {
      font-size: 13px;
      color: var(--text-muted);
    }
    .shortcut-keys {
      display: flex;
      gap: 4px;
    }
    .shortcut-key {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      font-family: ui-monospace, monospace;
    }
    .shortcuts-help-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s;
    }
    .shortcuts-help-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    /* ── v3: Color stripe on cue items ── */
    .cue-item[data-color] {
      border-left-width: 4px;
      border-left-style: solid;
    }
  </style>
</head>
<body>
  <div class="connection-lost-banner" id="connection-lost-banner">Connection lost — reconnecting...</div>
  <div class="app" id="app">
    <div class="state-msg" id="loading-msg">Loading show&hellip;</div>
  </div>

  <!-- v3: Keyboard shortcuts help button -->
  <button class="shortcuts-help-btn" id="shortcuts-help-btn" title="Keyboard shortcuts (?)">?</button>

  <!-- v3: Keyboard shortcuts overlay -->
  <div class="shortcuts-overlay" id="shortcuts-overlay">
    <div class="shortcuts-panel">
      <h3>Keyboard Shortcuts</h3>
      <div class="shortcut-row"><span class="shortcut-label">Advance cue (GO)</span><span class="shortcut-keys"><span class="shortcut-key">Space</span><span class="shortcut-key">&rarr;</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">Go back</span><span class="shortcut-keys"><span class="shortcut-key">&larr;</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">End show</span><span class="shortcut-keys"><span class="shortcut-key">Esc</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">Toggle Next Up panel</span><span class="shortcut-keys"><span class="shortcut-key">N</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">Toggle theme</span><span class="shortcut-keys"><span class="shortcut-key">T</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">Toggle fullscreen</span><span class="shortcut-keys"><span class="shortcut-key">F</span></span></div>
      <div class="shortcut-row"><span class="shortcut-label">Show this help</span><span class="shortcut-keys"><span class="shortcut-key">?</span></span></div>
      <div style="text-align:center;margin-top:16px"><button class="btn btn-cancel" id="shortcuts-close" style="font-size:12px;padding:6px 16px">Close</button></div>
    </div>
  </div>

  <!-- Styled confirm modal -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-panel">
      <h3 id="confirm-title">End Live</h3>
      <p id="confirm-message">End live mode? This will stop all timers and item tracking.</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">End Live</button>
      </div>
    </div>
  </div>

  <!-- Inline edit overlay -->
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-panel">
      <h3>Edit Cue</h3>
      <div class="edit-field">
        <label for="edit-title">Title</label>
        <input type="text" id="edit-title">
      </div>
      <div class="edit-field">
        <label for="edit-duration">Duration (minutes)</label>
        <input type="number" id="edit-duration" min="0" step="0.5">
      </div>
      <div class="edit-field">
        <label for="edit-notes">Notes</label>
        <textarea id="edit-notes" rows="3"></textarea>
      </div>
      <div class="edit-field">
        <label for="edit-director-notes" style="color:#FFD740">Director Note</label>
        <input type="text" id="edit-director-notes" placeholder="Private note for directors/operators">
      </div>
      <div class="edit-actions">
        <button class="btn btn-cancel" id="edit-cancel">Cancel</button>
        <button class="btn btn-save" id="edit-save">Save</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    // ── State ──
    var token = location.pathname.split('/').pop();
    var query = new URLSearchParams(location.search);
    var isReadOnly = query.get('readonly') === '1';
    // Follow-room mode: subscribe to a specific room's live state regardless of the plan token.
    var followRoomId = query.get('follow') || null; // e.g. ?follow=main-sanctuary
    var apiBase = location.origin;
    var plan = null;        // { id, title, serviceDate, items, columns, liveState, roomName, ... }
    var items = [];
    var columns = [];
    var roomName = followRoomId ? ('Room: ' + followRoomId) : '';
    var liveState = null;   // { isLive, currentCueIndex, startedAt, currentCueStartedAt, ... }
    var pollTimer = null;
    var clockTimer = null;
    var countdownTimer = null;
    var editingItemId = null;
    var hiddenColumns = {};
    var lightTheme = false;
    var collapsedStacks = {};  // 10.1: { itemId: true } for collapsed stack parents
    var armedIndex = -1;       // 10.6: index of the armed (pre-loaded) next cue
    var showStorageKey = 'tally.rundown-show-display:' + token;
    var planCacheKey = 'tally.rundown.plan-cache:' + token;
    var connBanner = document.getElementById('connection-lost-banner');
    var consecutivePollFailures = 0;

    function readShowPrefs() {
      try {
        var raw = window.localStorage.getItem(showStorageKey);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch (e) { return null; }
    }

    function writeShowPrefs() {
      try {
        var data = {};
        var keys = Object.keys(hiddenColumns).filter(function (k) { return hiddenColumns[k]; });
        if (keys.length) data.hiddenColumns = keys;
        if (lightTheme) data.lightTheme = true;
        window.localStorage.setItem(showStorageKey, JSON.stringify(data));
      } catch (e) {}
    }

    function applyShowTheme() {
      document.body.classList.toggle('light-theme', lightTheme);
      var btn = document.getElementById('btn-show-theme');
      if (btn) btn.textContent = lightTheme ? 'Dark' : 'Light';
    }

    function toggleShowTheme() {
      lightTheme = !lightTheme;
      applyShowTheme();
      writeShowPrefs();
    }

    function isColumnHidden(key) {
      return !!hiddenColumns[key];
    }

    function toggleShowColumn(key) {
      if (hiddenColumns[key]) delete hiddenColumns[key];
      else hiddenColumns[key] = true;
      writeShowPrefs();
      renderCueList();
      renderShowColumnToggle();
    }

    function renderShowColumnToggle() {
      var list = document.getElementById('show-col-list');
      if (!list) return;
      var checkSvg = '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#0A0F0D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      var html = '';
      for (var i = 0; i < columns.length; i++) {
        var col = columns[i];
        var colKey = col.id || col.name;
        var checked = !isColumnHidden(colKey);
        html += '<div class="col-toggle-item' + (checked ? ' checked' : '') + '" data-col-key="' + escapeHtml(colKey) + '">';
        html += '<div class="col-toggle-check">' + checkSvg + '</div>';
        html += '<span class="col-toggle-label">' + escapeHtml(col.name || col.title || 'Column') + '</span>';
        html += '</div>';
      }
      list.innerHTML = html;
      var items = list.querySelectorAll('.col-toggle-item');
      for (var j = 0; j < items.length; j++) {
        (function (el) {
          el.addEventListener('click', function () {
            toggleShowColumn(el.getAttribute('data-col-key'));
          });
        })(items[j]);
      }
    }

    function toggleShowColumnsPopover(force) {
      var pop = document.getElementById('show-col-popover');
      var bd = document.getElementById('show-col-backdrop');
      var btn = document.getElementById('show-col-btn');
      if (!pop) return;
      var isOpen = typeof force === 'boolean' ? force : !pop.classList.contains('open');
      pop.classList.toggle('open', isOpen);
      if (bd) bd.classList.toggle('open', isOpen);
      if (btn) btn.classList.toggle('active', isOpen);
      if (isOpen) renderShowColumnToggle();
    }

    // Load stored prefs
    (function () {
      var prefs = readShowPrefs();
      if (prefs && Array.isArray(prefs.hiddenColumns)) {
        prefs.hiddenColumns.forEach(function (k) { hiddenColumns[k] = true; });
      }
      if (prefs && prefs.lightTheme) {
        lightTheme = true;
        applyShowTheme();
      }
    })();

    // ── API helper ──
    function getCsrfToken() {
      var m = document.cookie.match(/(?:^|;\s*)tally_csrf=([^;]+)/);
      return m ? m[1] : '';
    }

    function showApi(method, path, body) {
      var headers = { 'Content-Type': 'application/json' };
      var csrf = getCsrfToken();
      if (csrf) headers['x-csrf-token'] = csrf;
      var opts = {
        method: method,
        headers: headers,
        credentials: 'same-origin'
      };
      if (body && method !== 'GET') opts.body = JSON.stringify(body);
      return fetch(apiBase + path, opts).then(function(r) {
        if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || r.statusText); });
        return r.json();
      });
    }

    // ── Format helpers ──
    function fmtDuration(secs) {
      if (!secs || secs <= 0) return '0:00';
      var m = Math.floor(secs / 60);
      var s = Math.floor(secs % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function fmtClock(ms) {
      var d = new Date(ms);
      var h = d.getHours();
      var m = d.getMinutes();
      var s = d.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s + ' ' + ampm;
    }

    function fmtElapsed(startedAt) {
      if (!startedAt) return '--:--';
      var elapsed = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
      var h = Math.floor(elapsed / 3600);
      var m = Math.floor((elapsed % 3600) / 60);
      var s = elapsed % 60;
      if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ── 10.4 Validation helpers ──
    function countValidationWarnings() {
      if (!columns.length) return 0;
      var count = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        if (item.itemType === 'section') continue;
        var cells = item.customCells || [];
        for (var c = 0; c < cells.length; c++) {
          var cell = cells[c];
          var rules = cell.validationRules || [];
          for (var r = 0; r < rules.length; r++) {
            var rule = rules[r];
            if (rule.type === 'required' && !cell.value) { count++; break; }
            if (rule.type === 'match' && rule.value && cell.value === rule.value) { count++; break; }
            if (rule.type === 'not_match' && rule.value && cell.value !== rule.value && cell.value) { count++; break; }
          }
        }
      }
      return count;
    }

    // ── 10.1 Stack helpers ──
    function isStackParent(item) {
      return !!(item && item.isStackParent);
    }
    function isStackChild(item) {
      return !!(item && item.parentId);
    }
    function toggleStack(parentId) {
      if (collapsedStacks[parentId]) delete collapsedStacks[parentId];
      else collapsedStacks[parentId] = true;
      renderCueList();
    }

    function totalRemaining() {
      if (!liveState || !liveState.isLive) return null;
      var idx = liveState.currentCueIndex || 0;
      var total = 0;
      // Remaining on current cue
      var currentItem = items[idx];
      if (currentItem && currentItem.lengthSeconds > 0) {
        var cueElapsed = (Date.now() - (liveState.currentCueStartedAt || liveState.startedAt || Date.now())) / 1000;
        total += Math.max(0, currentItem.lengthSeconds - cueElapsed);
      }
      // Sum future cues
      for (var i = idx + 1; i < items.length; i++) {
        if (items[i].itemType !== 'section') {
          total += items[i].lengthSeconds || 0;
        }
      }
      return Math.round(total);
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function stripHtml(html) {
      var d = document.createElement('div');
      d.innerHTML = html || '';
      return d.textContent || '';
    }

    function fmtClockTime(ms) {
      var d = new Date(ms);
      var h = d.getHours();
      var m = d.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
    }

    // 12.3: Compute estimated start timestamps for all future items
    function computeEstimatedStarts() {
      if (!liveState || !liveState.isLive) return {};
      var idx = liveState.currentCueIndex || 0;
      var cueStartedAt = liveState.currentCueStartedAt || liveState.startedAt || Date.now();
      var currentItem = items[idx];
      var elapsed = Math.max(0, (Date.now() - cueStartedAt) / 1000);
      var remaining = currentItem ? Math.max(0, (currentItem.lengthSeconds || 0) - elapsed) : 0;
      var estStarts = {};
      var cursor = Date.now() + remaining * 1000;
      for (var i = idx + 1; i < items.length; i++) {
        estStarts[i] = cursor;
        cursor += (items[i].lengthSeconds || 0) * 1000;
      }
      return estStarts;
    }

    // ── Styled Confirm ──
    var _confirmResolve = null;
    function showConfirm(title, message, okLabel) {
      var overlay = document.getElementById('confirm-overlay');
      var titleEl = document.getElementById('confirm-title');
      var msgEl = document.getElementById('confirm-message');
      var okBtn = document.getElementById('confirm-ok');
      if (titleEl) titleEl.textContent = title || 'Confirm';
      if (msgEl) msgEl.textContent = message || '';
      if (okBtn) okBtn.textContent = okLabel || 'OK';
      if (overlay) overlay.classList.add('open');
      return new Promise(function(resolve) { _confirmResolve = resolve; });
    }
    function _closeConfirm(result) {
      var overlay = document.getElementById('confirm-overlay');
      if (overlay) overlay.classList.remove('open');
      if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
    }
    (function() {
      var okBtn = document.getElementById('confirm-ok');
      var cancelBtn = document.getElementById('confirm-cancel');
      var overlay = document.getElementById('confirm-overlay');
      if (okBtn) okBtn.addEventListener('click', function() { _closeConfirm(true); });
      if (cancelBtn) cancelBtn.addEventListener('click', function() { _closeConfirm(false); });
      if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) _closeConfirm(false); });
      // v3: Shortcuts overlay button bindings
      var helpBtn = document.getElementById('shortcuts-help-btn');
      var shortcutsClose = document.getElementById('shortcuts-close');
      var shortcutsOverlay = document.getElementById('shortcuts-overlay');
      if (helpBtn) helpBtn.addEventListener('click', function() { toggleShortcutsOverlay(); });
      if (shortcutsClose) shortcutsClose.addEventListener('click', function() { toggleShortcutsOverlay(); });
      if (shortcutsOverlay) shortcutsOverlay.addEventListener('click', function(e) { if (e.target === shortcutsOverlay) toggleShortcutsOverlay(); });
    })();

    // ── Screen Wake Lock ──
    var wakeLock = null;
    function requestWakeLock() {
      if (!('wakeLock' in navigator) || wakeLock) return;
      navigator.wakeLock.request('screen').then(function(lock) {
        wakeLock = lock;
        lock.addEventListener('release', function() { wakeLock = null; });
      }).catch(function() {});
    }
    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(function() {}); wakeLock = null; }
    }
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible' && liveState && liveState.isLive) requestWakeLock();
    });

    // ── Load plan data ──
    function loadPlan() {
      return showApi('GET', '/api/public/rundown/' + encodeURIComponent(token))
        .then(function(data) {
          plan = data;
          items = data.items || [];
          columns = data.columns || [];
          liveState = data.liveState || { isLive: false, currentCueIndex: -1 };
          roomName = data.roomName || '';
          // 12.1: Cache for offline use
          try { window.localStorage.setItem(planCacheKey, JSON.stringify(data)); } catch(e) {}
          return data;
        });
    }

    // ── Poll live state ──
    function pollLiveState() {
      showApi('GET', '/api/public/rundown/' + encodeURIComponent(token) + '/timer')
        .then(function(timer) {
          handleTimerMessage(timer);
        })
        .catch(function() {
          consecutivePollFailures++;
          if (consecutivePollFailures >= 2 && connBanner) connBanner.classList.add('visible');
        });
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(pollLiveState, 1500);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    // ── WebSocket transport (6.1) ──
    var ws = null;
    var wsReconnectTimer = null;
    var wsReconnectDelay = 1000;
    var wsConnected = false;
    var serverTimeOffset = 0; // local - server (ms)

    function computeServerOffset(serverTs) {
      if (!serverTs) return;
      serverTimeOffset = Date.now() - serverTs;
    }
    function serverNow() {
      return Date.now() - serverTimeOffset;
    }

    function handleTimerMessage(timer) {
      if (!timer) return;
      computeServerOffset(timer.server_timestamp);
      consecutivePollFailures = 0;
      if (connBanner) connBanner.classList.remove('visible');
      var wasLive = liveState && liveState.isLive;
      if (timer.is_live) {
        liveState = {
          isLive: true,
          currentCueIndex: timer.cue_index != null ? timer.cue_index : (liveState ? liveState.currentCueIndex : 0),
          startedAt: timer.started_at || (liveState ? liveState.startedAt : Date.now()),
          currentCueStartedAt: timer.timestamp ? timer.timestamp - (timer.elapsed_seconds || 0) * 1000 : (liveState ? liveState.currentCueStartedAt : Date.now()),
          timer: timer
        };
      } else {
        liveState = { isLive: false, currentCueIndex: -1 };
      }
      renderStatusBar();
      renderCueList();
      renderPreviewPanel();
      renderNextUp();
      if (timer.is_live && !wasLive) scrollToActive();
    }

    function connectWebSocket() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var wsUrl = followRoomId
        ? proto + '//' + location.host + '/rundown-follow?token=' + encodeURIComponent(token) + '&roomId=' + encodeURIComponent(followRoomId)
        : proto + '//' + location.host + '/rundown-show?token=' + encodeURIComponent(token);
      try { ws = new WebSocket(wsUrl); } catch (e) { startPolling(); return; }

      ws.onopen = function() {
        wsConnected = true;
        wsReconnectDelay = 1000;
        stopPolling(); // WS is primary; stop HTTP polling
        if (connBanner) connBanner.classList.remove('visible');
        consecutivePollFailures = 0;
      };

      ws.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === 'timer_state' || msg.type === 'rundown_timer') {
            handleTimerMessage(msg);
          } else if (msg.type === 'rundown_state' || msg.type === 'rundown_position') {
            // follow-room mode: build a timer-compatible message from rundown state
            if (followRoomId && msg.currentItem) {
              handleTimerMessage({
                is_live: true,
                cue_title: msg.currentItem.title || '',
                cue_index: msg.currentIndex,
                total_cues: msg.totalItems,
                cue_duration_seconds: msg.currentItem.lengthSeconds || 0,
                elapsed_seconds: msg.currentItem.elapsedSeconds || 0,
                remaining_seconds: msg.currentItem.remainingSeconds,
                is_overtime: msg.currentItem.isOvertime || false,
                overtime_seconds: msg.currentItem.overtimeSeconds || 0,
                is_warning: msg.currentItem.isWarning || false,
                next_cue_title: null,
                plan_id: msg.planId,
                plan_title: msg.planTitle || roomName,
                room_id: msg.roomId || followRoomId,
                started_at: msg.startedAt,
                timestamp: msg.timestamp || Date.now(),
                server_timestamp: msg.server_timestamp || msg.timestamp || Date.now(),
              });
            }
          } else if (msg.type === 'rundown_tick' && followRoomId) {
            // Patch live state from tick in follow mode
            if (liveState && liveState.timer) {
              liveState.timer.elapsed_seconds = msg.elapsedSeconds;
              liveState.timer.remaining_seconds = msg.remainingSeconds;
              liveState.timer.is_overtime = msg.isOvertime;
              liveState.timer.overtime_seconds = msg.overtimeSeconds;
              liveState.timer.is_warning = msg.isWarning;
              renderStatusBar();
            }
          } else if (msg.type === 'follow_room_info') {
            // Update room name display from server
            if (msg.roomId) {
              roomName = msg.roomId;
              var titleEl = document.getElementById('show-plan-title');
              if (titleEl && !plan) titleEl.textContent = 'Following: ' + msg.roomId;
            }
          } else if (msg.type === 'rundown_ended') {
            liveState = { isLive: false, currentCueIndex: -1 };
            renderStatusBar();
            renderCueList();
            renderNextUp();
          }
        } catch (e) { /* ignore parse errors */ }
      };

      ws.onclose = function() {
        wsConnected = false;
        ws = null;
        startPolling(); // Fall back to HTTP polling
        scheduleWsReconnect();
      };

      ws.onerror = function() {
        // onclose will fire after this
      };

      // Heartbeat
      var heartbeat = setInterval(function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        } else {
          clearInterval(heartbeat);
        }
      }, 25000);
    }

    function scheduleWsReconnect() {
      if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
      wsReconnectTimer = setTimeout(function() {
        connectWebSocket();
      }, wsReconnectDelay);
      wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 10000);
    }

    // ── Live controls ──
    function liveStart() {
      showApi('POST', '/api/public/rundown/' + encodeURIComponent(token) + '/live/start')
        .then(function(data) {
          if (data.plan) { items = data.plan.items || items; }
          liveState = {
            isLive: true,
            currentCueIndex: data.currentCueIndex || 0,
            startedAt: data.startedAt || Date.now(),
            currentCueStartedAt: data.currentCueStartedAt || Date.now()
          };
          requestWakeLock();
          render();
          scrollToActive();
        })
        .catch(function(e) { alert('Start failed: ' + e.message); });
    }

    function liveStop() {
      showConfirm('End Live', 'End live mode? This will stop all timers and item tracking.', 'End Live').then(function(ok) {
        if (!ok) return;
        showApi('POST', '/api/public/rundown/' + encodeURIComponent(token) + '/live/stop')
          .then(function() {
            liveState = { isLive: false, currentCueIndex: -1 };
            releaseWakeLock();
            render();
          })
          .catch(function(e) { alert('Stop failed: ' + e.message); });
      });
    }

    function liveGo() {
      showApi('POST', '/api/public/rundown/' + encodeURIComponent(token) + '/live/go')
        .then(function(data) {
          if (data.plan) { items = data.plan.items || items; }
          liveState = {
            isLive: true,
            currentCueIndex: data.currentCueIndex,
            startedAt: data.startedAt || (liveState ? liveState.startedAt : Date.now()),
            currentCueStartedAt: data.currentCueStartedAt || Date.now()
          };
          render();
          scrollToActive();
        })
        .catch(function(e) {
          if (e.message === 'Already at last cue') return;
          alert('Go failed: ' + e.message);
        });
    }

    function liveBack() {
      showApi('POST', '/api/public/rundown/' + encodeURIComponent(token) + '/live/back')
        .then(function(data) {
          if (data.plan) { items = data.plan.items || items; }
          liveState = {
            isLive: true,
            currentCueIndex: data.currentCueIndex,
            startedAt: data.startedAt || (liveState ? liveState.startedAt : Date.now()),
            currentCueStartedAt: data.currentCueStartedAt || Date.now()
          };
          render();
          scrollToActive();
        })
        .catch(function(e) {
          if (e.message === 'Already at first cue') return;
          alert('Back failed: ' + e.message);
        });
    }

    function liveGoto(index) {
      showApi('POST', '/api/public/rundown/' + encodeURIComponent(token) + '/live/goto/' + index)
        .then(function(data) {
          if (data.plan) { items = data.plan.items || items; }
          liveState = {
            isLive: true,
            currentCueIndex: data.currentCueIndex,
            startedAt: data.startedAt || (liveState ? liveState.startedAt : Date.now()),
            currentCueStartedAt: data.currentCueStartedAt || Date.now()
          };
          render();
          scrollToActive();
        })
        .catch(function(e) { alert('Goto failed: ' + e.message); });
    }

    // ── Inline edit ──
    function openEdit(itemId) {
      var item = items.find(function(it) { return it.id === itemId; });
      if (!item) return;
      editingItemId = itemId;
      document.getElementById('edit-title').value = item.title || '';
      document.getElementById('edit-duration').value = item.lengthSeconds ? (item.lengthSeconds / 60) : '';
      document.getElementById('edit-notes').value = item.notesText || stripHtml(item.notes || '');
      document.getElementById('edit-director-notes').value = item.directorNotes || '';
      document.getElementById('edit-overlay').classList.add('open');
      document.getElementById('edit-title').focus();
    }

    function closeEdit() {
      editingItemId = null;
      document.getElementById('edit-overlay').classList.remove('open');
    }

    function saveEdit() {
      if (!editingItemId) return;
      var title = document.getElementById('edit-title').value.trim();
      var durMin = parseFloat(document.getElementById('edit-duration').value) || 0;
      var notes = document.getElementById('edit-notes').value.trim();
      var directorNotes = document.getElementById('edit-director-notes').value.trim();
      var body = {};
      if (title) body.title = title;
      body.lengthSeconds = Math.round(durMin * 60);
      body.notes = notes;
      body.directorNotes = directorNotes;

      showApi('PUT', '/api/public/rundown/' + encodeURIComponent(token) + '/items/' + encodeURIComponent(editingItemId), body)
        .then(function(data) {
          if (data.plan && data.plan.items) {
            items = data.plan.items;
          } else {
            // Update locally
            var item = items.find(function(it) { return it.id === editingItemId; });
            if (item) {
              if (title) item.title = title;
              item.lengthSeconds = body.lengthSeconds;
              item.notes = notes;
              item.notesText = notes;
              item.directorNotes = directorNotes;
            }
          }
          closeEdit();
          renderCueList();
          renderNextUp();
        })
        .catch(function(e) { alert('Save failed: ' + e.message); });
    }

    // ── Scroll ──
    function scrollToActive() {
      if (!liveState || !liveState.isLive) return;
      var el = document.querySelector('.cue-item.is-current');
      if (el) {
        setTimeout(function() {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }

    // ── Keyboard shortcuts ──
    // v3: Keyboard shortcuts overlay state
    var shortcutsVisible = false;
    var nextUpVisible = true;

    function toggleShortcutsOverlay() {
      shortcutsVisible = !shortcutsVisible;
      var overlay = document.getElementById('shortcuts-overlay');
      if (overlay) overlay.classList.toggle('open', shortcutsVisible);
    }

    function toggleNextUpPanel() {
      nextUpVisible = !nextUpVisible;
      var el = document.getElementById('next-up');
      if (el) el.style.display = nextUpVisible ? '' : 'none';
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function() {});
      } else {
        document.exitFullscreen().catch(function() {});
      }
    }

    document.addEventListener('keydown', function(e) {
      // Don't capture when editing
      if (editingItemId) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      // Close shortcuts overlay on any key if open
      if (shortcutsVisible && e.key !== '?') {
        toggleShortcutsOverlay();
        return;
      }

      if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
        e.preventDefault();
        toggleShortcutsOverlay();
        return;
      }

      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        toggleNextUpPanel();
        return;
      }

      if (e.key === 't' || e.key === 'T') {
        e.preventDefault();
        toggleShowTheme();
        return;
      }

      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
        return;
      }

      if (isReadOnly) return; // No cue-advancing shortcuts in readonly mode

      if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') {
        e.preventDefault();
        if (liveState && liveState.isLive) liveGo();
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        if (liveState && liveState.isLive) liveBack();
      } else if (e.key === 'Escape') {
        if (document.getElementById('edit-overlay').classList.contains('open')) {
          closeEdit();
        } else if (liveState && liveState.isLive) {
          liveStop();
        }
      }
    });

    // ── Render ──
    function render() {
      var app = document.getElementById('app');
      app.innerHTML = '';

      // Topbar
      var topbar = document.createElement('div');
      topbar.className = 'topbar';
      topbar.innerHTML =
        '<div class="topbar-left">' +
          '<div class="brand-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#0A0F0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>' +
          '<div>' +
            '<div class="plan-title" id="show-plan-title">' + escapeHtml(plan ? plan.title : (followRoomId ? 'Following: ' + followRoomId : '')) + '</div>' +
            (followRoomId ? '<div class="plan-date" style="color:#00E676;font-weight:700;font-size:10px;letter-spacing:0.5px;text-transform:uppercase">Following Room</div>' : '') +
            (roomName && !followRoomId ? '<div class="plan-date" style="color:var(--green);font-weight:600;font-size:11px">' + escapeHtml(roomName) + '</div>' : '') +
            (plan && plan.serviceDate ? '<div class="plan-date">' + escapeHtml(plan.serviceDate) + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="topbar-right">' +
          '<button class="btn btn-back" id="btn-print" style="padding:6px 12px;font-size:12px;" title="Print rundown">Print</button>' +
          (columns.length ? '<div class="col-toggle-wrap">' +
            '<button class="col-toggle-btn" id="show-col-btn" title="Show/hide columns">Columns</button>' +
            '<div class="col-toggle-backdrop" id="show-col-backdrop"></div>' +
            '<div class="col-toggle-popover" id="show-col-popover">' +
              '<div class="col-toggle-title">Visible Columns</div>' +
              '<div id="show-col-list"></div>' +
            '</div>' +
          '</div>' : '') +
          (isReadOnly ? '<span class="pill pill-offline" style="font-size:10px;padding:3px 10px">Read Only</span>' : '') +
          '<button class="col-toggle-btn" id="btn-show-theme" title="Toggle light/dark theme">' + (lightTheme ? 'Dark' : 'Light') + '</button>' +
          '<div class="show-clock" id="show-clock">' + fmtClock(Date.now()) + '</div>' +
        '</div>';
      app.appendChild(topbar);

      // Bind column toggle events
      var colBtn = document.getElementById('show-col-btn');
      var colBd = document.getElementById('show-col-backdrop');
      if (colBtn) colBtn.addEventListener('click', function () { toggleShowColumnsPopover(); });
      if (colBd) colBd.addEventListener('click', function () { toggleShowColumnsPopover(false); });
      if (columns.length) renderShowColumnToggle();

      // Status bar
      var sb = document.createElement('div');
      sb.className = 'status-bar' + (liveState && liveState.isLive ? ' is-live' : '');
      sb.id = 'status-bar';
      app.appendChild(sb);
      renderStatusBar();

      // Controls (hidden in readonly mode)
      if (!isReadOnly) {
        var ctrl = document.createElement('div');
        ctrl.className = 'controls';
        ctrl.id = 'controls';
        app.appendChild(ctrl);
        renderControls();
      }

      // Cue list
      var cueWrap = document.createElement('div');
      cueWrap.className = 'cue-list-wrap';
      cueWrap.id = 'cue-list';
      app.appendChild(cueWrap);
      renderCueList();

      // 10.6: Preview / Arm panel
      var previewPanel = document.createElement('div');
      previewPanel.className = 'preview-panel';
      previewPanel.id = 'preview-panel';
      app.appendChild(previewPanel);
      renderPreviewPanel();

      // Next up
      var nextUp = document.createElement('div');
      nextUp.className = 'next-up';
      nextUp.id = 'next-up';
      app.appendChild(nextUp);
      renderNextUp();

      // Start timers
      startClockTimer();
      startCountdownTimer();
      scrollToActive();

      // Print button
      var btnPrint = document.getElementById('btn-print');
      if (btnPrint) btnPrint.addEventListener('click', function () { printRundown(); });
      var btnShowTheme = document.getElementById('btn-show-theme');
      if (btnShowTheme) btnShowTheme.addEventListener('click', function () { toggleShowTheme(); });
    }

    function renderStatusBar() {
      var sb = document.getElementById('status-bar');
      if (!sb) return;
      var isLive = liveState && liveState.isLive;
      sb.className = 'status-bar' + (isLive ? ' is-live' : '');

      var html = '<div class="status-pills">';
      if (isLive) {
        html += '<span class="pill pill-live">LIVE</span>';
        // Primary: current cue + remaining (always visible)
        var cueIdx = liveState.currentCueIndex || 0;
        var nonSectionCount = items.filter(function(it) { return it.itemType !== 'section'; }).length;
        var currentSeq = 0;
        for (var i = 0; i <= cueIdx && i < items.length; i++) {
          if (items[i].itemType !== 'section') currentSeq++;
        }
        html += '<span class="cue-counter">Cue ' + currentSeq + '/' + nonSectionCount + '</span>';
        var rem = totalRemaining();
        var remClass = 'pill pill-remaining';
        if (rem !== null && rem <= 30 && rem > 0) remClass += ' is-warning';
        if (rem !== null && rem <= 0) remClass += ' is-overtime';
        html += '<span class="' + remClass + '" id="pill-remaining">' + (rem !== null ? fmtDuration(rem) : '--:--') + '</span>';
        // Secondary: elapsed (hidden on narrow, tap to expand)
        html += '<button class="status-expand-btn" id="status-expand-btn">More</button>';
        html += '<div class="status-secondary" id="status-secondary">';
        html += '<span class="pill pill-elapsed" id="pill-elapsed">Elapsed ' + fmtElapsed(liveState.startedAt) + '</span>';
        html += '</div>';
      } else {
        html += '<span class="pill pill-offline">STANDBY</span>';
        var totalDur = items.reduce(function(sum, it) { return sum + (it.itemType === 'section' ? 0 : (it.lengthSeconds || 0)); }, 0);
        html += '<span class="pill pill-remaining">Total ' + fmtDuration(totalDur) + '</span>';
      }
      // 10.4: Validation warning count
      var warnCount = countValidationWarnings();
      if (warnCount > 0) {
        html += '<span class="pill pill-warn" title="Items needing attention">' + warnCount + ' need attention</span>';
      }
      html += '</div>';

      sb.innerHTML = html;

      // Bind expand button
      var expandBtn = document.getElementById('status-expand-btn');
      if (expandBtn) {
        expandBtn.addEventListener('click', function() {
          var sec = document.getElementById('status-secondary');
          if (sec) {
            var expanded = sec.classList.toggle('expanded');
            expandBtn.textContent = expanded ? 'Less' : 'More';
          }
        });
      }
    }

    function renderControls() {
      var ctrl = document.getElementById('controls');
      if (!ctrl) return;
      var isLive = liveState && liveState.isLive;
      var html = '';

      if (isLive) {
        var isFirst = true;
        var isLast = true;
        var idx = liveState.currentCueIndex || 0;
        // Check if there's a previous non-section cue
        for (var p = idx - 1; p >= 0; p--) {
          if (items[p] && items[p].itemType !== 'section') { isFirst = false; break; }
        }
        // Check if there's a next non-section cue
        for (var n = idx + 1; n < items.length; n++) {
          if (items[n] && items[n].itemType !== 'section') { isLast = false; break; }
        }

        html += '<button class="btn btn-stop btn-show" id="btn-stop">End Show</button>';
        html += '<button class="btn btn-back" id="btn-back"' + (isFirst ? ' disabled' : '') + '>';
        html += '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>';
        html += 'Back</button>';
        html += '<button class="btn btn-go" id="btn-go"' + (isLast ? ' disabled' : '') + '>GO';
        html += '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
        html += '</button>';
      } else {
        html += '<button class="btn btn-start btn-show" id="btn-start">';
        html += '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        html += ' Start Show</button>';
      }

      ctrl.innerHTML = html;

      // Bind events
      var btnStart = document.getElementById('btn-start');
      var btnStop = document.getElementById('btn-stop');
      var btnGo = document.getElementById('btn-go');
      var btnBack = document.getElementById('btn-back');
      if (btnStart) btnStart.addEventListener('click', liveStart);
      if (btnStop) btnStop.addEventListener('click', liveStop);
      if (btnGo) btnGo.addEventListener('click', liveGo);
      if (btnBack) btnBack.addEventListener('click', liveBack);
    }

    function renderCueList() {
      var wrap = document.getElementById('cue-list');
      if (!wrap) return;
      var isLive = liveState && liveState.isLive;
      var activeIdx = isLive ? (liveState.currentCueIndex || 0) : -1;

      var html = '';
      var seq = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var isSection = item.itemType === 'section';
        var isStandby = item.itemType === 'standby';
        var isBlackout = item.itemType === 'blackout';
        var isChild = !!item.parentId;
        var isParent = !!item.isStackParent;
        var isCurrent = isLive && i === activeIdx;
        var isCompleted = isLive && i < activeIdx;
        var parentCollapsed = isChild && !!collapsedStacks[item.parentId];
        if (!isSection) seq++;

        var cls = 'cue-item';
        if (isSection) cls += ' is-section';
        if (isCurrent) cls += ' is-current';
        if (isCompleted) cls += ' is-completed';
        if (isStandby) cls += ' is-standby';
        if (isBlackout) cls += ' is-blackout';
        if (isChild) cls += ' is-child';
        if (parentCollapsed) cls += ' stack-child-hidden';

        if (isSection) {
          var sectionColor = item.color || '#556270';
          html += '<div class="' + cls + '" style="border-left:4px solid ' + sectionColor + ';background:' + sectionColor + '12"><div class="cue-title">' + escapeHtml(item.title) + '</div></div>';
          continue;
        }

        var itemColor = item.color || '';
        var itemBorderStyle = itemColor ? 'border-left:4px solid ' + itemColor + ';padding-left:12px' : '';
        html += '<div class="' + cls + '" data-index="' + i + '" data-id="' + escapeHtml(item.id) + '"' + (itemBorderStyle ? ' style="' + itemBorderStyle + '"' : '') + '>';

        // Number
        html += '<div class="cue-num">' + (isChild ? '&middot;' : seq) + '</div>';

        // Body
        html += '<div class="cue-body">';
        html += '<div class="cue-title-row">';
        // Stack parent: collapse/expand toggle
        if (isParent) {
          var isCollapsed = !!collapsedStacks[item.id];
          html += '<button class="stack-toggle' + (isCollapsed ? ' collapsed' : '') + '" data-stack-id="' + escapeHtml(item.id) + '" title="' + (isCollapsed ? 'Expand stack' : 'Collapse stack') + '">';
          html += '<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
          html += escapeHtml(item.childCount) + '</button>';
        }
        html += '<span class="cue-title">' + escapeHtml(item.title) + '</span>';
        var typeLabel = isStandby ? 'Standby' : isBlackout ? 'Blackout' : (item.itemType && item.itemType !== 'other' ? item.itemType : '');
        if (typeLabel) {
          html += '<span class="cue-type-badge">' + escapeHtml(typeLabel) + '</span>';
        }
        html += '</div>';

        // Meta
        var metaParts = [];
        if (item.assignee) metaParts.push('<span class="assignee">' + escapeHtml(item.assignee) + '</span>');
        if (item.startType === 'hard' && item.hardStartTime) metaParts.push('Hard start: ' + escapeHtml(item.hardStartTime));
        if (metaParts.length) html += '<div class="cue-meta">' + metaParts.join(' &middot; ') + '</div>';

        // Notes (expanded for current cue)
        var notesText = item.notesText || stripHtml(item.notes || '');
        if (notesText) {
          html += '<div class="cue-notes">' + escapeHtml(notesText) + '</div>';
        }

        // Director notes (visible to operators, not public)
        if (item.directorNotes) {
          html += '<div style="margin-top:4px;padding:3px 8px;background:rgba(255,215,64,0.08);border-radius:4px;border-left:2px solid #FFD740;font-size:11px"><span style="color:#FFD740;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;font-size:10px">Dir Note</span> <span style="color:var(--text-muted)">' + escapeHtml(item.directorNotes) + '</span></div>';
        }

        // Custom columns
        // Custom columns with 10.4 validation indicators
        if (columns.length && item.customCells && item.customCells.length) {
          var colHtml = '';
          for (var c = 0; c < item.customCells.length; c++) {
            var cell = item.customCells[c];
            var cellKey = cell.id || cell.columnId || cell.name;
            if (!isColumnHidden(cellKey)) {
              var hasWarn = false;
              var cellRules = cell.validationRules || [];
              for (var r = 0; r < cellRules.length; r++) {
                var rule = cellRules[r];
                if (rule.type === 'required' && !cell.value) { hasWarn = true; break; }
                if (rule.type === 'match' && rule.value && cell.value === rule.value) { hasWarn = true; break; }
                if (rule.type === 'not_match' && rule.value && cell.value !== rule.value && cell.value) { hasWarn = true; break; }
              }
              if (cell.value || hasWarn) {
                colHtml += '<span class="cue-col-chip' + (hasWarn ? '" style="color:var(--amber);border-left:2px solid var(--amber);padding-left:4px' : '') + '">';
                colHtml += '<span class="col-name">' + escapeHtml(cell.name) + ':</span>';
                colHtml += '<span class="col-val">' + (cell.value ? escapeHtml(cell.value) : '<em style="opacity:0.5">empty</em>') + '</span>';
                if (hasWarn) colHtml += ' <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
                colHtml += '</span>';
              }
            }
          }
          if (colHtml) html += '<div class="cue-columns">' + colHtml + '</div>';
        }

        html += '</div>'; // end cue-body

        // Timing — for stack parents show aggregate if children are collapsed
        html += '<div class="cue-timing">';
        var displayDuration = (isParent && item.stackDuration != null && !!collapsedStacks[item.id])
          ? item.stackDuration : (item.lengthSeconds || 0);
        if (isCurrent && displayDuration > 0) {
          var cueStartedAt = liveState.currentCueStartedAt || liveState.startedAt || Date.now();
          var cueElapsed = Math.max(0, (Date.now() - cueStartedAt) / 1000);
          var cueRemaining = Math.max(0, displayDuration - cueElapsed);
          var isOvertime = cueElapsed > displayDuration;
          var isWarning = !isOvertime && cueRemaining <= 30;
          var cdClass = 'cue-countdown';
          if (isOvertime) cdClass += ' is-overtime';
          else if (isWarning) cdClass += ' is-warning';
          html += '<div class="' + cdClass + '" id="cue-cd">' + (isOvertime ? '-' + fmtDuration(cueElapsed - displayDuration) : fmtDuration(cueRemaining)) + '</div>';
          html += '<div class="cue-elapsed-label">' + (isOvertime ? 'overtime' : 'remaining') + '</div>';
        } else {
          html += '<div class="cue-duration">' + fmtDuration(displayDuration) + '</div>';
          // 12.3: Est. start for future cues during live show
          if (isLive && i > activeIdx) {
            html += '<div class="cue-est-start" id="cue-est-' + i + '"></div>';
          }
        }
        html += '</div>';

        html += '</div>'; // end cue-item
      }

      wrap.innerHTML = html;

      // 10.1: Bind stack toggle buttons
      var stackToggles = wrap.querySelectorAll('.stack-toggle');
      for (var st = 0; st < stackToggles.length; st++) {
        (function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleStack(btn.getAttribute('data-stack-id'));
          });
        })(stackToggles[st]);
      }

      // Bind click events (disabled in readonly mode)
      if (!isReadOnly) {
        var cueItems = wrap.querySelectorAll('.cue-item[data-index]');
        for (var j = 0; j < cueItems.length; j++) {
          (function(el) {
            el.addEventListener('click', function(e) {
              if (e.target.closest && e.target.closest('.stack-toggle')) return;
              var index = parseInt(el.dataset.index, 10);
              if (isLive) {
                liveGoto(index);
              }
            });
            el.addEventListener('dblclick', function(e) {
              e.preventDefault();
              openEdit(el.dataset.id);
            });
          })(cueItems[j]);
        }
      }
    }

    // ── 10.6 Preview / Arm panel ──
    function renderPreviewPanel() {
      var wrap = document.getElementById('preview-panel');
      if (!wrap) return;
      var isLive = liveState && liveState.isLive;
      if (!isLive) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';

      var idx = liveState.currentCueIndex || 0;
      // Find next non-section item
      var nextItem = null;
      var nextIdx = -1;
      for (var i = idx + 1; i < items.length; i++) {
        if (items[i].itemType !== 'section') { nextItem = items[i]; nextIdx = i; break; }
      }

      if (!nextItem) {
        wrap.style.display = 'none';
        return;
      }

      // Collect equipment-bound column values for the next item
      var equipChips = [];
      if (nextItem.customCells) {
        for (var c = 0; c < nextItem.customCells.length; c++) {
          var cell = nextItem.customCells[c];
          if (cell.equipmentBinding && cell.value) {
            equipChips.push({ label: cell.name, binding: cell.equipmentBinding, value: cell.value });
          }
        }
      }

      var isArmed = armedIndex === nextIdx;
      wrap.className = 'preview-panel' + (isArmed ? ' is-armed' : '');

      var html = '<div class="preview-panel-header">';
      html += '<div class="preview-panel-label">Next Cue Preview</div>';
      if (!isReadOnly) {
        html += '<button class="btn-arm' + (isArmed ? ' armed' : '') + '" id="btn-arm">' + (isArmed ? 'Armed' : 'Arm') + '</button>';
      }
      html += '</div>';
      html += '<div class="preview-cue-title">' + escapeHtml(nextItem.title) + '</div>';
      if (equipChips.length) {
        html += '<div class="preview-equip-list">';
        for (var e = 0; e < equipChips.length; e++) {
          html += '<div class="preview-equip-chip"><span class="chip-label">' + escapeHtml(equipChips[e].label) + '</span>' + escapeHtml(equipChips[e].value) + '</div>';
        }
        html += '</div>';
      } else {
        html += '<div style="font-size:11px;color:var(--text-dim);margin-top:2px">No equipment bindings on next cue</div>';
      }
      wrap.innerHTML = html;

      var armBtn = document.getElementById('btn-arm');
      if (armBtn) {
        armBtn.addEventListener('click', function() {
          armedIndex = isArmed ? -1 : nextIdx;
          renderPreviewPanel();
        });
      }
    }

    function renderNextUp() {
      var wrap = document.getElementById('next-up');
      if (!wrap) return;
      var isLive = liveState && liveState.isLive;
      if (!isLive) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';

      var activeIdx = liveState.currentCueIndex || 0;
      var currentItem = items[activeIdx];
      var upcoming = [];
      for (var i = activeIdx + 1; i < items.length && upcoming.length < 3; i++) {
        if (items[i].itemType !== 'section') upcoming.push(items[i]);
      }

      var html = '';

      // 3.5: Current cue panel (visible on landscape tablets via CSS)
      if (currentItem) {
        html += '<div class="show-current-panel">';
        html += '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:' + 'var(--green)' + '">Now Playing</div>';
        html += '<div style="font-size:18px;font-weight:800;color:var(--text);line-height:1.2">' + escapeHtml(currentItem.title) + '</div>';
        if (currentItem.lengthSeconds > 0) {
          html += '<div style="font-family:ui-monospace,\'SF Mono\',monospace;font-size:28px;font-weight:800;color:var(--green);margin-top:4px" id="panel-cue-cd">' + fmtDuration(currentItem.lengthSeconds) + '</div>';
        }
        var notesText = currentItem.notesText || stripHtml(currentItem.notes || '');
        if (notesText) {
          html += '<div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-top:8px">' + escapeHtml(notesText) + '</div>';
        }
        if (currentItem.directorNotes) {
          html += '<div style="margin-top:6px;padding:4px 8px;background:rgba(255,215,64,0.08);border-radius:4px;border-left:2px solid #FFD740;font-size:12px"><span style="color:#FFD740;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;font-size:10px">Dir Note</span> <span style="color:var(--text-muted)">' + escapeHtml(currentItem.directorNotes) + '</span></div>';
        }
        html += '</div>';
      }

      if (!upcoming.length) {
        html += '<div class="next-up-label">End of show</div>';
        wrap.innerHTML = html;
        return;
      }

      html += '<div class="next-up-label">Next Up</div><div class="next-up-items">';
      for (var u = 0; u < upcoming.length; u++) {
        html += '<div class="next-up-item">';
        html += '<span class="next-up-title">' + escapeHtml(upcoming[u].title) + '</span>';
        html += '<span class="next-up-dur">' + fmtDuration(upcoming[u].lengthSeconds || 0) + '</span>';
        html += '</div>';
      }
      html += '</div>';
      wrap.innerHTML = html;
    }

    // ── Timers ──
    function startClockTimer() {
      if (clockTimer) clearInterval(clockTimer);
      clockTimer = setInterval(function() {
        var el = document.getElementById('show-clock');
        if (el) el.textContent = fmtClock(Date.now());
      }, 1000);
    }
