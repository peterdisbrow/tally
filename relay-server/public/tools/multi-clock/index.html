<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multi-Clock — TallyConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'DSEG7-Classic'; src: url('../clock/fonts/DSEG7Classic-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }
@font-face { font-family: 'DSEG14-Classic'; src: url('../clock/fonts/DSEG14Classic-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }
@font-face { font-family: 'DSEG7-Modern'; src: url('../clock/fonts/DSEG7Modern-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000; color: #ccc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden; user-select: none;
}
body { display: flex; flex-direction: column; }

/* ── Toolbar ── */
.toolbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  transition: opacity 0.5s ease; pointer-events: none;
  opacity: 0;
}
body:hover .toolbar, body.touch-active .toolbar { opacity: 1; pointer-events: auto; }
.toolbar .left, .toolbar .right { display: flex; align-items: center; gap: 12px; }
.toolbar a, .toolbar button {
  background: none; border: none; color: rgba(255,255,255,0.3);
  font: 700 10px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.15em;
  padding: 0; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
.toolbar a:hover, .toolbar button:hover { color: rgba(255,255,255,0.7); }
.toolbar .layout-btn {
  padding: 4px 8px; border: 1px solid rgba(255,255,255,0.1); transition: color 0.2s, border-color 0.2s;
}
.toolbar .layout-btn.active { color: #ef4444; border-color: rgba(239,68,68,0.5); }

/* ── Clock grid ── */
.clock-grid {
  flex: 1; display: grid; gap: 4px; padding: 4px; padding-top: 48px;
}
.clock-grid.layout-2x1 { grid-template-columns: 1fr 1fr; }
.clock-grid.layout-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.clock-grid.layout-1x3 { grid-template-columns: 1fr 1fr 1fr; }
.clock-grid.layout-1x4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* ── Clock cell ── */
.clock-cell {
  position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden;
  min-height: 180px; transition: opacity 0.2s, transform 0.2s; cursor: grab;
}
.clock-cell.dragging { opacity: 0.4; transform: scale(0.95); }

/* Cell hover controls */
.cell-controls {
  position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; z-index: 30; opacity: 0; transition: opacity 0.3s;
}
.clock-cell:hover .cell-controls { opacity: 1; }
.cell-controls button {
  background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; padding: 2px; transition: color 0.2s;
}
.cell-controls button:hover { color: rgba(255,255,255,0.7); }
.cell-controls .del-btn:hover { color: #ef4444; }

/* Cell name label */
.cell-label {
  font: 700 11px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 4px;
}

/* Cell time display */
.cell-time {
  font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; line-height: 1.1;
  transition: font-size 0.15s ease-out;
}

/* Cell AM/PM */
.cell-ampm { font: 700 13px/1 'JetBrains Mono', monospace; letter-spacing: 0.2em; margin-top: 4px; }

/* Cell timezone label */
.cell-tz { font: 400 10px/1 'JetBrains Mono', monospace; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); margin-top: 4px; }

/* Cell timer controls */
.cell-timer-controls { display: flex; gap: 6px; margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
.clock-cell:hover .cell-timer-controls { opacity: 1; }
.cell-timer-controls button {
  background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 13px; transition: color 0.2s;
}
.cell-timer-controls button:hover { color: rgba(255,255,255,0.7); }

/* ── Cell settings panel ── */
.cell-settings {
  position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 20;
  padding: 16px; overflow-y: auto; display: none; flex-direction: column; gap: 12px;
}
.cell-settings.open { display: flex; }
.cell-settings .section-label { color: rgba(255,255,255,0.3); font: 700 10px/1 'JetBrains Mono', monospace; }
.cell-settings .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }
.cell-settings .opt-btn {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
  font: 700 10px/1 'JetBrains Mono', monospace; padding: 4px 8px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.cell-settings .opt-btn.active { border-color: currentColor; }
.cell-settings input[type="text"] {
  background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
  outline: none; font: 400 12px/1 'JetBrains Mono', monospace; color: rgba(255,255,255,0.7); padding: 4px;
}
.cell-settings .color-dot {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s;
}
.cell-settings .color-dot.active { border-color: white; transform: scale(1.2); }
.cell-settings .close-btn {
  margin-top: auto; align-self: center; background: none; border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4); font: 700 10px/1 'JetBrains Mono', monospace; padding: 4px 12px; cursor: pointer;
}

/* ── Empty slot ── */
.empty-slot {
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.1); cursor: pointer; transition: color 0.2s, border-color 0.2s;
  font-size: 32px;
}
.empty-slot:hover { color: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.2); }

/* ── Logo ── */
.logo {
  position: absolute; bottom: 12px; right: 16px; z-index: 50;
  display: flex; flex-direction: column; align-items: flex-end;
  opacity: 0; transition: opacity 0.5s;
}
body:hover .logo, body.touch-active .logo { opacity: 1; }
.logo .top { font: 700 11px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: 0.25em; color: rgba(255,255,255,0.2); }
.logo .bottom { font: 400 7px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: 0.35em; color: rgba(255,255,255,0.15); margin-top: -1px; }

/* ── Mobile ── */
@media (max-width: 600px) {
  .clock-grid.layout-1x3 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr; }
  .clock-grid.layout-1x4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .toolbar { padding: 8px 10px; }
  .toolbar a, .toolbar button { font-size: 9px; }
  .toolbar .layout-btn { font-size: 8px; padding: 3px 6px; }
  .clock-cell { min-height: 120px; }
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <div class="left">
    <a href="/tools/clock" title="Single clock">&#9632; Single</a>
  </div>
  <div class="right">
    <button class="layout-btn" data-layout="2x1">2 Wide</button>
    <button class="layout-btn" data-layout="2x2">2×2 Grid</button>
    <button class="layout-btn" data-layout="1x3">3 Stack</button>
    <button class="layout-btn" data-layout="1x4">4 Stack</button>
    <button id="btnAdd" style="display:none">+ Add</button>
  </div>
</div>

<!-- ── Clock grid ── -->
<div class="clock-grid" id="clockGrid"></div>

<!-- ── Logo ── -->
<div class="logo">
  <span class="top">DISBROW</span>
  <span class="bottom">PRODUCTIONS</span>
</div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'broadcast-multi-clocks';
  const LAYOUT_KEY = 'broadcast-multi-layout';

  const FONTS = [
    { name: 'dseg7',       label: '7-Segment',    css: "'DSEG7-Classic', monospace",   weight: 700 },
    { name: 'dseg14',      label: '14-Segment',   css: "'DSEG14-Classic', monospace",  weight: 700 },
    { name: 'dseg7modern', label: '7-Seg Modern', css: "'DSEG7-Modern', monospace",    weight: 700 },
    { name: 'digital',     label: 'Digital',      css: "'Share Tech Mono', monospace", weight: 400 },
    { name: 'mono',        label: 'Classic Mono', css: "'JetBrains Mono', monospace",  weight: 700 },
    { name: 'system',      label: 'System',       css: "ui-monospace, monospace",      weight: 700 },
  ];

  const COLORS = [
    { label: 'Red',     value: '#ef4444' },
    { label: 'Green',   value: '#22c55e' },
    { label: 'Amber',   value: '#f59e0b' },
    { label: 'Blue',    value: '#3b82f6' },
    { label: 'Cyan',    value: '#06b6d4' },
    { label: 'White',   value: '#ffffff' },
    { label: 'Magenta', value: '#d946ef' },
  ];

  const TIMEZONES = [
    { label: 'Local',      value: 'local' },
    { label: 'UTC',        value: 'UTC' },
    { label: 'US Eastern', value: 'America/New_York' },
    { label: 'US Central', value: 'America/Chicago' },
    { label: 'US Mountain',value: 'America/Denver' },
    { label: 'US Pacific', value: 'America/Los_Angeles' },
    { label: 'London',     value: 'Europe/London' },
    { label: 'Paris',      value: 'Europe/Paris' },
    { label: 'Tokyo',      value: 'Asia/Tokyo' },
    { label: 'Sydney',     value: 'Australia/Sydney' },
    { label: 'Dubai',      value: 'Asia/Dubai' },
    { label: 'Hong Kong',  value: 'Asia/Hong_Kong' },
    { label: 'Singapore',  value: 'Asia/Singapore' },
    { label: 'Mumbai',     value: 'Asia/Kolkata' },
  ];

  const COUNTDOWN_PRESETS = [
    { label: '1m', seconds: 60 }, { label: '5m', seconds: 300 },
    { label: '10m', seconds: 600 }, { label: '15m', seconds: 900 },
    { label: '30m', seconds: 1800 }, { label: '1h', seconds: 3600 },
    { label: '2h', seconds: 7200 },
  ];

  const LAYOUTS = {
    '2x1': { max: 2 },
    '2x2': { max: 4 },
    '1x3': { max: 3 },
    '1x4': { max: 4 },
  };

  const defaultClocks = [
    { id: '1', clockName: 'New York', clockColor: '#ef4444', fontName: 'dseg7', timezone: 'America/New_York', is24h: false, mode: 'clock', countdownFrom: 300, displayStyle: 'digital', thickness: 3 },
    { id: '2', clockName: 'London', clockColor: '#22c55e', fontName: 'dseg7', timezone: 'Europe/London', is24h: true, mode: 'clock', countdownFrom: 300, displayStyle: 'digital', thickness: 3 },
  ];

  // ── State ──
  let clocks = loadClocks();
  let layout = loadLayout();
  let dragIndex = null;

  // Per-cell timer state (keyed by clock id)
  const timers = {};
  function getTimer(id) {
    if (!timers[id]) timers[id] = { start: null, acc: 0, elapsed: 0, paused: true };
    return timers[id];
  }

  function loadClocks() {
    try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : defaultClocks; }
    catch { return defaultClocks; }
  }
  function loadLayout() {
    try { return localStorage.getItem(LAYOUT_KEY) || '2x1'; } catch { return '2x1'; }
  }
  function saveClocks() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clocks)); } catch {} }
  function saveLayout() { try { localStorage.setItem(LAYOUT_KEY, layout); } catch {} }

  function getTimeInZone(date, tz) {
    if (tz === 'local') return { hours: date.getHours(), minutes: date.getMinutes(), seconds: date.getSeconds() };
    const str = date.toLocaleString('en-US', { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const p = str.split(':');
    return { hours: parseInt(p[0]) % 24, minutes: parseInt(p[1]), seconds: parseInt(p[2]) };
  }

  function formatTimer(totalMs) {
    const abs = Math.abs(totalMs);
    const totalSec = Math.floor(abs / 1000);
    const ms = Math.floor((abs % 1000) / 10);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    let text = h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`
      : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
    return { text, negative: totalMs < 0 };
  }

  function hexAlpha(hex, a) { return hex + Math.round(a * 255).toString(16).padStart(2, '0'); }

  // ── Grid management ──
  const grid = document.getElementById('clockGrid');
  const btnAdd = document.getElementById('btnAdd');

  function addClock() {
    if (clocks.length >= LAYOUTS[layout].max) return;
    const colors = ['#ef4444', '#22c55e', '#3b82f6', '#f59e0b'];
    clocks.push({
      id: Date.now().toString(), clockName: '', clockColor: colors[clocks.length % 4],
      fontName: 'dseg7', timezone: 'local', is24h: false, mode: 'clock',
      countdownFrom: 300, displayStyle: 'digital', thickness: 3,
    });
    saveClocks(); buildGrid();
  }

  function removeClock(id) {
    clocks = clocks.filter(c => c.id !== id);
    delete timers[id];
    saveClocks(); buildGrid();
  }

  function updateClock(id, updates) {
    const c = clocks.find(c => c.id === id);
    if (c) Object.assign(c, updates);
    saveClocks();
  }

  // ── Build grid ──
  function buildGrid() {
    grid.innerHTML = '';
    grid.className = 'clock-grid layout-' + layout;

    const max = LAYOUTS[layout].max;
    const visible = clocks.slice(0, max);

    visible.forEach((clock, index) => {
      const cell = document.createElement('div');
      cell.className = 'clock-cell';
      cell.draggable = true;
      cell.dataset.index = index;
      cell.dataset.id = clock.id;

      // Drag events
      cell.addEventListener('dragstart', (e) => { e.dataTransfer.effectAllowed = 'move'; dragIndex = index; cell.classList.add('dragging'); });
      cell.addEventListener('dragend', () => { cell.classList.remove('dragging'); dragIndex = null; });
      cell.addEventListener('dragover', (e) => e.preventDefault());
      cell.addEventListener('drop', (e) => {
        e.preventDefault();
        if (dragIndex !== null && dragIndex !== index) {
          const [dragged] = clocks.splice(dragIndex, 1);
          clocks.splice(index, 0, dragged);
          dragIndex = null; saveClocks(); buildGrid();
        }
      });

      // Controls row
      const controls = document.createElement('div');
      controls.className = 'cell-controls';
      controls.innerHTML = `
        <span style="color:rgba(255,255,255,0.3);cursor:grab;font-size:16px">⠿</span>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="timer-play" style="display:none;font-size:13px" title="Play/Pause">▶</button>
          <button class="timer-reset" style="display:none;font-size:13px" title="Reset">↺</button>
          <button class="settings-btn" title="Settings" style="font-size:15px">⚙</button>
          <button class="del-btn" title="Remove" style="font-size:15px">✕</button>
        </div>
      `;
      cell.appendChild(controls);

      // Clock name label
      const label = document.createElement('div');
      label.className = 'cell-label';
      cell.appendChild(label);

      // Time display
      const timeEl = document.createElement('div');
      timeEl.className = 'cell-time';
      cell.appendChild(timeEl);

      // AM/PM
      const ampmEl = document.createElement('div');
      ampmEl.className = 'cell-ampm';
      ampmEl.style.display = 'none';
      cell.appendChild(ampmEl);

      // TZ label
      const tzEl = document.createElement('div');
      tzEl.className = 'cell-tz';
      cell.appendChild(tzEl);

      // Settings panel
      const settingsPanel = buildSettingsPanel(clock);
      cell.appendChild(settingsPanel);

      // Event: settings
      controls.querySelector('.settings-btn').onclick = (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle('open');
      };

      // Event: delete
      controls.querySelector('.del-btn').onclick = (e) => {
        e.stopPropagation();
        removeClock(clock.id);
      };

      // Event: play/pause
      controls.querySelector('.timer-play').onclick = (e) => {
        e.stopPropagation();
        const t = getTimer(clock.id);
        if (t.paused) { t.start = Date.now(); t.paused = false; }
        else { if (t.start !== null) { t.acc += Date.now() - t.start; t.start = null; } t.paused = true; }
      };

      // Event: reset
      controls.querySelector('.timer-reset').onclick = (e) => {
        e.stopPropagation();
        const t = getTimer(clock.id);
        t.acc = 0; t.start = null; t.elapsed = 0; t.paused = true;
      };

      grid.appendChild(cell);
    });

    // Empty slots
    if (clocks.length < max) {
      for (let i = 0; i < max - clocks.length; i++) {
        const slot = document.createElement('div');
        slot.className = 'empty-slot';
        slot.textContent = '+';
        slot.onclick = addClock;
        grid.appendChild(slot);
      }
    }

    // Add button visibility
    btnAdd.style.display = clocks.length < max ? '' : 'none';

    // Layout buttons
    document.querySelectorAll('.layout-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.layout === layout);
    });
  }

  function buildSettingsPanel(clock) {
    const panel = document.createElement('div');
    panel.className = 'cell-settings';
    panel.onclick = (e) => e.stopPropagation();

    const font = FONTS.find(f => f.name === clock.fontName) || FONTS[0];
    const mode = clock.mode || 'clock';
    const displayStyle = clock.displayStyle || 'digital';

    let html = '<p class="section-label">Settings</p>';

    // Display style
    html += '<div><p class="section-label">Display</p><div class="btn-row">';
    ['digital', 'analog'].forEach(d => {
      html += `<button class="opt-btn${displayStyle === d ? ' active' : ''}" data-action="display" data-value="${d}" style="${displayStyle === d ? 'color:' + clock.clockColor : ''}">${d.charAt(0).toUpperCase() + d.slice(1)}</button>`;
    });
    html += '</div></div>';

    // Mode
    html += '<div><p class="section-label">Mode</p><div class="btn-row">';
    [{ v: 'clock', l: 'Clock' }, { v: 'countup', l: 'Count Up' }, { v: 'countdown', l: 'Countdown' }, { v: 'countto', l: 'Count To' }].forEach(m => {
      html += `<button class="opt-btn${mode === m.v ? ' active' : ''}" data-action="mode" data-value="${m.v}" style="${mode === m.v ? 'color:' + clock.clockColor : ''}">${m.l}</button>`;
    });
    html += '</div></div>';

    // Count To target
    if (mode === 'countto') {
      html += '<div><p class="section-label">Target Time</p><div class="btn-row"><input type="time" class="countto-input" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);font:400 12px/1 \'JetBrains Mono\',monospace;padding:4px 8px;border-radius:4px"><button class="opt-btn" data-action="set-countto" style="color:' + clock.clockColor + '">Set</button></div></div>';
    }

    // Countdown duration
    if (mode === 'countdown') {
      html += '<div><p class="section-label">Duration</p><div class="btn-row">';
      COUNTDOWN_PRESETS.forEach(p => {
        const active = (clock.countdownFrom || 300) === p.seconds;
        html += `<button class="opt-btn${active ? ' active' : ''}" data-action="countdown-dur" data-value="${p.seconds}" style="${active ? 'color:' + clock.clockColor : ''}">${p.label}</button>`;
      });
      html += '</div></div>';
    }

    // Name
    html += `<input type="text" class="name-input" value="${clock.clockName || ''}" placeholder="Clock name...">`;

    // Timezone (clock mode only)
    if (mode === 'clock') {
      html += '<div><p class="section-label">Timezone</p><div class="btn-row">';
      TIMEZONES.forEach(t => {
        const active = clock.timezone === t.value;
        html += `<button class="opt-btn${active ? ' active' : ''}" data-action="timezone" data-value="${t.value}" style="${active ? 'color:' + clock.clockColor : ''}">${t.label}</button>`;
      });
      html += '</div></div>';
    }

    // Color
    html += '<div><p class="section-label">Color</p><div class="btn-row">';
    COLORS.forEach(c => {
      html += `<div class="color-dot${clock.clockColor === c.value ? ' active' : ''}" data-action="color" data-value="${c.value}" style="background:${c.value}"></div>`;
    });
    html += '</div></div>';

    // Font
    html += '<div><p class="section-label">Font</p><div class="btn-row">';
    FONTS.forEach(f => {
      const active = clock.fontName === f.name;
      html += `<button class="opt-btn${active ? ' active' : ''}" data-action="font" data-value="${f.name}" style="font-family:${f.css};${active ? 'color:' + clock.clockColor : ''}">${f.label}</button>`;
    });
    html += '</div></div>';

    // 12/24h toggle (clock mode)
    if (mode === 'clock') {
      html += `<button class="opt-btn" data-action="toggle24h" style="color:${clock.clockColor}">${clock.is24h ? '24H → 12H' : '12H → 24H'}</button>`;
    }

    html += '<button class="close-btn" data-action="close-settings">Close</button>';

    panel.innerHTML = html;

    // Wire up settings actions
    panel.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const value = btn.dataset.value;

      if (action === 'display') { updateClock(clock.id, { displayStyle: value }); clock.displayStyle = value; }
      else if (action === 'mode') {
        updateClock(clock.id, { mode: value }); clock.mode = value;
        const t = getTimer(clock.id); t.acc = 0; t.start = null; t.elapsed = 0; t.paused = true;
      }
      else if (action === 'countdown-dur') { updateClock(clock.id, { countdownFrom: parseInt(value) }); clock.countdownFrom = parseInt(value); }
      else if (action === 'set-countto') {
        const inp = panel.querySelector('.countto-input');
        if (inp && inp.value) {
          const [h, m] = inp.value.split(':').map(Number);
          const target = new Date(); target.setHours(h, m, 0, 0);
          if (target.getTime() < Date.now()) target.setDate(target.getDate() + 1);
          updateClock(clock.id, { countToTarget: target.getTime() }); clock.countToTarget = target.getTime();
        }
        return; // don't rebuild
      }
      else if (action === 'timezone') { updateClock(clock.id, { timezone: value }); clock.timezone = value; }
      else if (action === 'color') { updateClock(clock.id, { clockColor: value }); clock.clockColor = value; }
      else if (action === 'font') { updateClock(clock.id, { fontName: value }); clock.fontName = value; }
      else if (action === 'toggle24h') { updateClock(clock.id, { is24h: !clock.is24h }); clock.is24h = !clock.is24h; }
      else if (action === 'close-settings') { panel.classList.remove('open'); return; }

      // Rebuild settings panel content to reflect changes
      const newPanel = buildSettingsPanel(clock);
      newPanel.classList.add('open');
      panel.parentElement.replaceChild(newPanel, panel);
    });

    // Name input
    const nameInp = panel.querySelector('.name-input');
    if (nameInp) {
      nameInp.addEventListener('input', () => { updateClock(clock.id, { clockName: nameInp.value }); clock.clockName = nameInp.value; });
    }

    return panel;
  }

  // ── Render loop ──
  function render() {
    const now = new Date();
    const cells = grid.querySelectorAll('.clock-cell');

    cells.forEach(cell => {
      const id = cell.dataset.id;
      const clock = clocks.find(c => c.id === id);
      if (!clock) return;

      const mode = clock.mode || 'clock';
      const displayStyle = clock.displayStyle || 'digital';
      const font = FONTS.find(f => f.name === clock.fontName) || FONTS[0];
      const tzData = TIMEZONES.find(t => t.value === clock.timezone);
      const tzLabel = tzData ? tzData.label : clock.timezone;
      const timer = getTimer(id);

      // Show/hide timer controls
      const playBtn = cell.querySelector('.timer-play');
      const resetBtn = cell.querySelector('.timer-reset');
      if (mode !== 'clock' && mode !== 'countto') {
        playBtn.style.display = '';
        resetBtn.style.display = '';
        playBtn.textContent = timer.paused ? '▶' : '⏸';
      } else {
        playBtn.style.display = 'none';
        resetBtn.style.display = 'none';
      }

      // Update timer elapsed
      timer.elapsed = timer.acc + (timer.start !== null ? Date.now() - timer.start : 0);

      // Compute time
      let timeText, ampm = '', isNegative = false;

      if (mode === 'countup') {
        const r = formatTimer(timer.elapsed);
        timeText = r.text; isNegative = r.negative;
      } else if (mode === 'countdown') {
        const remainMs = (clock.countdownFrom || 300) * 1000 - timer.elapsed;
        const r = formatTimer(remainMs);
        timeText = r.text; isNegative = r.negative;
        if (remainMs < 0) timeText = '-' + timeText;
      } else if (mode === 'countto' && clock.countToTarget) {
        const diffMs = clock.countToTarget - now.getTime();
        const negative = diffMs < 0;
        const absSec = Math.floor(Math.abs(diffMs) / 1000);
        const h = Math.floor(absSec / 3600);
        const m = Math.floor((absSec % 3600) / 60);
        const s = absSec % 60;
        isNegative = negative;
        timeText = h > 0
          ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
          : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (negative) timeText = '-' + timeText;
      } else {
        const tz = getTimeInZone(now, clock.timezone);
        let h = tz.hours;
        ampm = h >= 12 ? 'PM' : 'AM';
        if (!clock.is24h && h > 12) h -= 12;
        if (!clock.is24h && h === 0) h = 12;
        timeText = `${String(h).padStart(2,'0')}:${String(tz.minutes).padStart(2,'0')}:${String(tz.seconds).padStart(2,'0')}`;
      }

      const countdownRemMs = (clock.countdownFrom || 300) * 1000 - timer.elapsed;
      const isOvertime = mode === 'countdown' && countdownRemMs < 0;
      const color = isOvertime ? '#ef4444' : clock.clockColor;

      // Auto-size within cell
      const cellW = cell.clientWidth * 0.85;
      const charCount = timeText.length * 0.6;
      const cellFontSize = Math.max(20, Math.min(Math.floor(cellW / charCount), 300));

      // Label
      const labelEl = cell.querySelector('.cell-label');
      const modeLabel = mode === 'countup' ? 'Count Up' : mode === 'countdown' ? 'Countdown' : mode === 'countto' ? 'Count To' : '';
      labelEl.textContent = clock.clockName || modeLabel || tzLabel;
      labelEl.style.color = hexAlpha(clock.clockColor, 0.53);

      // Time
      const timeEl = cell.querySelector('.cell-time');
      if (displayStyle === 'digital') {
        timeEl.style.display = '';
        timeEl.textContent = timeText;
        timeEl.style.fontSize = (cellFontSize * 0.6) + 'px';
        timeEl.style.fontFamily = font.css;
        timeEl.style.fontWeight = font.weight;
        timeEl.style.color = color;
      } else {
        timeEl.style.display = 'none';
      }

      // AM/PM
      const ampmEl = cell.querySelector('.cell-ampm');
      if (mode === 'clock' && !clock.is24h && displayStyle === 'digital') {
        ampmEl.style.display = '';
        ampmEl.textContent = ampm;
        ampmEl.style.color = hexAlpha(clock.clockColor, 0.5);
      } else {
        ampmEl.style.display = 'none';
      }

      // TZ label
      const tzEl = cell.querySelector('.cell-tz');
      if (mode === 'clock') tzEl.textContent = tzLabel;
      else if (mode === 'countto') tzEl.textContent = clock.countToTarget ? 'COUNTING TO' : 'SET TARGET';
      else tzEl.textContent = timer.paused ? 'PAUSED' : 'RUNNING';

      // Analog rendering (inline SVG in cell)
      if (displayStyle === 'analog') {
        timeEl.style.display = 'none';
        let svgEl = cell.querySelector('.cell-analog');
        if (!svgEl) {
          svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svgEl.setAttribute('viewBox', '0 0 300 300');
          svgEl.classList.add('cell-analog');
          svgEl.style.cssText = 'max-width:100%;max-height:60%;';
          cell.insertBefore(svgEl, cell.querySelector('.cell-ampm'));
        }
        svgEl.style.display = '';

        const tz = getTimeInZone(now, clock.timezone);
        const cx = 150, cy = 150, r = 140;
        const secA = (tz.seconds / 60) * 360 - 90;
        const minA = ((tz.minutes + tz.seconds / 60) / 60) * 360 - 90;
        const hourA = (((tz.hours % 12) + tz.minutes / 60) / 12) * 360 - 90;
        const rad = a => a * Math.PI / 180;
        const end = (a, l) => ({ x: cx + l * Math.cos(rad(a)), y: cy + l * Math.sin(rad(a)) });
        const hEnd = end(hourA, r * 0.5), mEnd = end(minA, r * 0.7), sEnd = end(secA, r * 0.85);
        const th = clock.thickness || 3;

        let svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${hexAlpha(color, 0.25)}" stroke-width="${2+th}"/>`;
        for (let i = 0; i < 60; i++) {
          const a = (i / 60) * 360 - 90; const isHr = i % 5 === 0;
          const oR = r - 2, iR = isHr ? r - (10 + th * 2) : r - (4 + th);
          const p1 = end(a, iR), p2 = end(a, oR);
          svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isHr ? hexAlpha(color, 0.56) : hexAlpha(color, 0.25)}" stroke-width="${isHr ? 1.5 + th * 0.8 : 0.5 + th * 0.5}" stroke-linecap="round"/>`;
        }
        for (let i = 1; i <= 12; i++) {
          const a = (i / 12) * 360 - 90; const p = end(a, r - 26);
          svg += `<text x="${p.x}" y="${p.y}" fill="${hexAlpha(color, 0.44)}" font-size="18" font-family="${font.css}" font-weight="${font.weight}" text-anchor="middle" dominant-baseline="central">${i}</text>`;
        }
        svg += `<line x1="${cx}" y1="${cy}" x2="${hEnd.x}" y2="${hEnd.y}" stroke="${color}" stroke-width="${3+th*1.5}" stroke-linecap="round"/>`;
        svg += `<line x1="${cx}" y1="${cy}" x2="${mEnd.x}" y2="${mEnd.y}" stroke="${color}" stroke-width="${2+th}" stroke-linecap="round"/>`;
        svg += `<line x1="${cx}" y1="${cy}" x2="${sEnd.x}" y2="${sEnd.y}" stroke="${hexAlpha(color, 0.8)}" stroke-width="${0.5+th*0.5}" stroke-linecap="round"/>`;
        svg += `<circle cx="${cx}" cy="${cy}" r="${3+th}" fill="${color}"/>`;
        svg += `<text x="${cx}" y="${cy+38}" fill="${hexAlpha(color, 0.56)}" font-size="18" font-family="${font.css}" font-weight="${font.weight}" text-anchor="middle" dominant-baseline="central">${timeText}</text>`;
        if (mode === 'clock' && !clock.is24h) svg += `<text x="${cx}" y="${cy+54}" fill="${hexAlpha(color, 0.31)}" font-size="10" font-family="${font.css}" text-anchor="middle" dominant-baseline="central">${ampm}</text>`;
        svgEl.innerHTML = svg;
      } else {
        const svgEl = cell.querySelector('.cell-analog');
        if (svgEl) svgEl.style.display = 'none';
      }
    });
  }

  // ── Layout buttons ──
  document.querySelectorAll('.layout-btn').forEach(b => {
    b.onclick = () => { layout = b.dataset.layout; saveLayout(); buildGrid(); };
  });

  btnAdd.onclick = addClock;

  // Touch support for hover toolbar
  document.body.addEventListener('touchstart', () => {
    document.body.classList.add('touch-active');
    clearTimeout(document.body._touchTimer);
    document.body._touchTimer = setTimeout(() => document.body.classList.remove('touch-active'), 4000);
  });

  // ── Init ──
  buildGrid();
  setInterval(render, 200);

})();
</script>
</body>
</html>
