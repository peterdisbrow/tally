<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Broadcast Clock — TallyConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'DSEG7-Classic'; src: url('fonts/DSEG7Classic-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }
@font-face { font-family: 'DSEG14-Classic'; src: url('fonts/DSEG14Classic-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }
@font-face { font-family: 'DSEG7-Modern'; src: url('fonts/DSEG7Modern-Bold.woff2') format('woff2'); font-weight: bold; font-display: swap; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000; color: #ccc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden; user-select: none;
}

body { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: default; }

/* ── Toolbar (auto-hide after 3s) ── */
.toolbar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; z-index: 50; transition: opacity 0.5s ease; }
.toolbar.hidden { opacity: 0; pointer-events: none; }
.toolbar .left, .toolbar .right { display: flex; align-items: center; gap: 12px; }
.toolbar button, .toolbar a {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
  font: 700 10px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.15em;
  padding: 5px 10px; cursor: pointer; text-decoration: none; transition: color 0.2s, border-color 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.toolbar button:hover, .toolbar a:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.3); }
.toolbar button.active { border-color: currentColor; }

/* ── Mode bar (center top) ── */
.mode-bar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 50; transition: opacity 0.5s ease; }
.mode-bar.hidden { opacity: 0; pointer-events: none; }
.mode-bar button {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.2);
  font: 700 11px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.15em;
  padding: 6px 14px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.mode-bar button.active { border-color: currentColor; }

/* ── Clock name ── */
.clock-name {
  position: absolute; z-index: 40; font: 700 13px/1 'JetBrains Mono', monospace;
  text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; transition: opacity 0.5s ease;
}
.clock-name.hidden { opacity: 0; }
.clock-name input {
  background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
  outline: none; text-align: center; font: inherit; text-transform: inherit; letter-spacing: inherit; padding: 2px 8px;
}

/* ── Main time display ── */
.time-display {
  font-family: 'DSEG7-Classic', monospace; font-weight: 700;
  letter-spacing: 0.05em; white-space: nowrap; line-height: 1.1;
  transition: color 0.3s;
}
.time-display.pulse { animation: pulse 0.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.ampm {
  font: 700 18px/1 'JetBrains Mono', monospace; letter-spacing: 0.2em; margin-top: 4px;
}

/* ── Mini clock ── */
.mini-clock {
  position: absolute; font: 400 18px/1 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  top: 52px; left: 50%; transform: translateX(-50%); z-index: 40; transition: opacity 0.5s ease;
}
.mini-clock.hidden { opacity: 0; }

/* ── Size controls ── */
.size-controls {
  position: absolute; bottom: 16px; left: 16px; z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: opacity 0.5s ease;
}
.size-controls.hidden { opacity: 0; pointer-events: none; }
.size-controls button {
  background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.2s;
}
.size-controls button:hover { color: rgba(255,255,255,0.7); }
.size-controls .size-label { color: rgba(255,255,255,0.2); font: 400 10px/1 'JetBrains Mono', monospace; }
.size-controls .auto-btn {
  font: 700 10px/1 'JetBrains Mono', monospace; padding: 3px 8px; cursor: pointer; background: none;
  border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.2); transition: all 0.2s;
}
.size-controls .auto-btn.active { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }

/* ── NTP status ── */
.ntp-status {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 50;
  font: 400 10px/1 'JetBrains Mono', monospace; color: rgba(255,255,255,0.2);
  display: flex; align-items: center; gap: 4px; transition: opacity 0.5s ease;
}
.ntp-status.hidden { opacity: 0; }
.ntp-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.ntp-dot.synced { background: rgba(34,197,94,0.6); }
.ntp-dot.local { background: rgba(255,255,255,0.4); }
.ntp-dot.syncing { background: rgba(234,179,8,0.6); animation: pulse 1s infinite; }

/* ── Timer controls (bottom center) ── */
.timer-controls {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; z-index: 50; transition: opacity 0.5s ease;
}
.timer-controls.hidden { opacity: 0; pointer-events: none; }
.timer-controls button {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
  font: 700 11px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 6px 16px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.timer-controls button:hover { color: var(--active-color, #ef4444); border-color: var(--active-color-dim, rgba(239,68,68,0.5)); }

/* ── Countdown presets ── */
.countdown-presets {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; z-index: 50; transition: opacity 0.5s ease;
}
.countdown-presets.hidden { opacity: 0; pointer-events: none; }
.countdown-presets button {
  background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
  font: 700 11px/1 'JetBrains Mono', monospace; text-transform: uppercase; padding: 6px 14px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.countdown-presets button:hover { color: var(--active-color, #ef4444); border-color: var(--active-color-dim, rgba(239,68,68,0.5)); }

/* ── Dropdown panels ── */
.panel {
  position: absolute; top: 48px; right: 16px; z-index: 60; background: rgba(0,0,0,0.95);
  border: 1px solid rgba(255,255,255,0.1); padding: 8px; display: none; flex-direction: column; gap: 2px; min-width: 200px; max-height: 320px; overflow-y: auto;
}
.panel.open { display: flex; }
.panel button {
  background: none; border: none; padding: 8px 12px; text-align: left; font: 400 12px/1 'JetBrains Mono', monospace;
  color: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.15s, color 0.15s; display: flex; align-items: center; gap: 8px;
}
.panel button:hover { background: rgba(255,255,255,0.05); }
.panel button.selected { background: rgba(255,255,255,0.05); }
.panel .swatch { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }

/* ── Time-entry overlay ── */
.time-entry {
  position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 70;
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
.time-entry.open { display: flex; }
.time-entry .label { color: rgba(255,255,255,0.5); font: 400 14px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 16px; }
.time-entry .input { font: 700 clamp(40px, 10vw, 80px)/1 'JetBrains Mono', monospace; letter-spacing: 0.1em; }
.time-entry .hint { color: rgba(255,255,255,0.3); font: 400 12px/1 'JetBrains Mono', monospace; margin-top: 16px; }

/* ── Help panel ── */
.help-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: min(320px, 90vw); background: rgba(0,0,0,0.95);
  border-left: 1px solid rgba(255,255,255,0.1); padding: 24px; overflow-y: auto; z-index: 60;
  display: none; flex-direction: column;
}
.help-panel.open { display: flex; }
.help-panel h3 { font: 700 13px/1 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 24px; }
.help-panel .row { display: flex; justify-content: space-between; gap: 8px; font: 400 12px/1.6 'JetBrains Mono', monospace; color: rgba(255,255,255,0.5); }
.help-panel .row .key { flex-shrink: 0; }
.help-panel .row .desc { text-align: right; }
.help-panel .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); font: 400 12px/1.6 'JetBrains Mono', monospace; color: rgba(255,255,255,0.3); }

/* ── Analog clock ── */
.analog-container { display: flex; align-items: center; justify-content: center; }
.analog-container svg { max-width: 100%; max-height: 100%; }

/* ── Logo ── */
.logo {
  position: absolute; bottom: 12px; right: 16px; z-index: 50; display: flex; flex-direction: column; align-items: flex-end;
}
.logo .top { font: 700 11px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: 0.25em; color: rgba(255,255,255,0.2); }
.logo .bottom { font: 400 7px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: 0.35em; color: rgba(255,255,255,0.15); margin-top: -1px; }

/* ── Mobile fixes ── */
@media (max-width: 600px) {
  .toolbar { padding: 8px 10px; }
  .toolbar button, .toolbar a { font-size: 9px; padding: 4px 7px; }
  .mode-bar button { font-size: 9px; padding: 4px 10px; }
  .size-controls { display: none; }
  .help-panel { width: 100vw; }
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar" id="toolbar">
  <div class="left">
    <a href="/tools/multi-clock" title="Multi-clock view">&#9638; Multi</a>
  </div>
  <div class="right">
    <button id="btnPresetSave" title="Save preset">Save</button>
    <button id="btnPresetLoad" title="Load preset">Load</button>
    <button id="btnColor" title="Change color (K)">Color</button>
    <button id="btnTz" title="Timezone">TZ</button>
    <button id="btnFont" title="Font (F)">Font</button>
    <button id="btnAnalog" title="Toggle analog/digital">Style</button>
    <button id="btnHelp" title="Shortcuts">?</button>
  </div>
</div>

<!-- ── Mode bar ── -->
<div class="mode-bar" id="modeBar">
  <button data-mode="clock" class="active">Clock</button>
  <button data-mode="countup">Count Up</button>
  <button data-mode="countdown">Countdown</button>
</div>

<!-- ── Clock name ── -->
<div class="clock-name" id="clockName"></div>

<!-- ── Mini clock ── -->
<div class="mini-clock hidden" id="miniClock"></div>

<!-- ── Main display ── -->
<div class="time-display" id="timeDisplay">00:00:00</div>
<div class="ampm" id="ampmDisplay" style="display:none"></div>

<!-- ── Analog display ── -->
<div class="analog-container" id="analogContainer" style="display:none">
  <svg id="analogSvg" viewBox="0 0 300 300" width="400" height="400"></svg>
</div>

<!-- ── Timer controls ── -->
<div class="timer-controls hidden" id="timerControls">
  <button id="btnPause">Pause</button>
  <button id="btnReset">Reset</button>
</div>

<!-- ── Countdown presets ── -->
<div class="countdown-presets hidden" id="countdownPresets">
  <button data-sec="60">1m</button>
  <button data-sec="120">2m</button>
  <button data-sec="300">5m</button>
  <button data-sec="600">10m</button>
  <button data-sec="900">15m</button>
  <button data-sec="1800">30m</button>
  <button data-sec="3600">1h</button>
</div>

<!-- ── Size controls ── -->
<div class="size-controls" id="sizeControls">
  <button id="btnSizeUp">+</button>
  <span class="size-label" id="sizeLabel">auto</span>
  <button id="btnSizeDown">−</button>
  <button class="auto-btn active" id="btnAutoSize">AUTO</button>
</div>

<!-- ── NTP status ── -->
<div class="ntp-status" id="ntpStatus"><span class="ntp-dot syncing"></span> Syncing...</div>

<!-- ── Panels ── -->
<div class="panel" id="panelColor"></div>
<div class="panel" id="panelTz"></div>
<div class="panel" id="panelFont"></div>
<div class="panel" id="panelPresets"></div>

<!-- ── Time entry overlay ── -->
<div class="time-entry" id="timeEntry">
  <div class="label" id="timeEntryLabel">Enter countdown (hh:mm:ss)</div>
  <div class="input" id="timeEntryInput" style="color:#ef4444">—:——:——</div>
  <div class="hint">Press Enter to confirm · Escape to cancel</div>
</div>

<!-- ── Help panel ── -->
<div class="help-panel" id="helpPanel">
  <h3 id="helpTitle" style="color:#ef4444">Keyboard Shortcuts</h3>
  <div id="helpBody"></div>
  <div class="footer">
    <p>⇧ = Shift · ⌃ = Ctrl</p>
    <p style="margin-top:8px">Digit 0 is treated as 10</p>
    <p style="margin-top:8px">UI auto-hides after 3s of inactivity</p>
    <p style="margin-top:8px">Settings are saved automatically</p>
  </div>
</div>

<!-- ── Logo ── -->
<div class="logo" id="logo">
  <span class="top">DISBROW</span>
  <span class="bottom">PRODUCTIONS</span>
</div>

<script>
(function() {
  'use strict';

  // ── Constants ──
  const STORAGE_KEY = 'broadcast-clock-settings';
  const PRESETS_KEY = 'broadcast-clock-presets';
  const AUTO_HIDE_DELAY = 3000;

  const FONTS = [
    { name: 'dseg7',       label: '7-Segment',    css: "'DSEG7-Classic', monospace",   weight: 700 },
    { name: 'dseg14',      label: '14-Segment',   css: "'DSEG14-Classic', monospace",  weight: 700 },
    { name: 'dseg7modern', label: '7-Seg Modern', css: "'DSEG7-Modern', monospace",    weight: 700 },
    { name: 'digital',     label: 'Digital',      css: "'Share Tech Mono', monospace", weight: 400 },
    { name: 'mono',        label: 'Classic Mono', css: "'JetBrains Mono', monospace",  weight: 700 },
    { name: 'system',      label: 'System',       css: "ui-monospace, monospace",      weight: 700 },
  ];

  const COLORS = [
    { label: 'Red',     value: '#ef4444' },
    { label: 'Green',   value: '#22c55e' },
    { label: 'Amber',   value: '#f59e0b' },
    { label: 'Blue',    value: '#3b82f6' },
    { label: 'Cyan',    value: '#06b6d4' },
    { label: 'White',   value: '#ffffff' },
    { label: 'Magenta', value: '#d946ef' },
  ];

  const TIMEZONES = [
    { label: 'Local',      value: 'local' },
    { label: 'UTC',        value: 'UTC' },
    { label: 'US Eastern', value: 'America/New_York' },
    { label: 'US Central', value: 'America/Chicago' },
    { label: 'US Mountain',value: 'America/Denver' },
    { label: 'US Pacific', value: 'America/Los_Angeles' },
    { label: 'London',     value: 'Europe/London' },
    { label: 'Paris',      value: 'Europe/Paris' },
    { label: 'Tokyo',      value: 'Asia/Tokyo' },
    { label: 'Sydney',     value: 'Australia/Sydney' },
    { label: 'Dubai',      value: 'Asia/Dubai' },
    { label: 'Hong Kong',  value: 'Asia/Hong_Kong' },
    { label: 'Singapore',  value: 'Asia/Singapore' },
    { label: 'Mumbai',     value: 'Asia/Kolkata' },
  ];

  const COUNTDOWN_PRESETS = [
    { label: '1m', seconds: 60 },
    { label: '2m', seconds: 120 },
    { label: '5m', seconds: 300 },
    { label: '10m', seconds: 600 },
    { label: '15m', seconds: 900 },
    { label: '30m', seconds: 1800 },
    { label: '1h', seconds: 3600 },
  ];

  // ── State ──
  const saved = loadSettings();
  let mode = saved.mode || 'clock';           // clock | countup | countdown | countto
  let is24h = saved.is24h ?? false;
  let showTenths = saved.showTenths ?? false;
  let showMiniClock = saved.showMiniClock ?? false;
  let hideLeadingZero = saved.hideLeadingZero ?? false;
  let fontSize = saved.fontSize ?? 200;
  let autoSize = saved.autoSize ?? true;
  let displayStyle = saved.displayStyle || 'digital';  // digital | analog
  let selectedFont = FONTS.find(f => f.name === saved.fontName) || FONTS[0];
  let timezone = saved.timezone || 'local';
  let clockName = saved.clockName || '';
  let clockColor = saved.clockColor || '#ef4444';
  let logoVisible = true;

  let ntpOffset = 0;
  let syncStatus = 'syncing';
  let paused = false;
  let countdownFrom = 300;
  let countToTarget = null;
  let sign = '+';

  // ms-precision timer
  let timerStart = null;
  let timerAcc = 0;
  let timerElapsedMs = 0;

  // UI state
  let uiVisible = true;
  let hideTimer = null;
  let editingName = false;
  let enteringTime = false;
  let enterMode = 'countdown';
  let timeInput = '';

  // ── DOM refs ──
  const $ = id => document.getElementById(id);
  const toolbar = $('toolbar');
  const modeBar = $('modeBar');
  const clockNameEl = $('clockName');
  const miniClockEl = $('miniClock');
  const timeDisplay = $('timeDisplay');
  const ampmDisplay = $('ampmDisplay');
  const analogContainer = $('analogContainer');
  const analogSvg = $('analogSvg');
  const timerControls = $('timerControls');
  const countdownPresetsEl = $('countdownPresets');
  const sizeControls = $('sizeControls');
  const ntpStatusEl = $('ntpStatus');
  const panelColor = $('panelColor');
  const panelTz = $('panelTz');
  const panelFont = $('panelFont');
  const panelPresets = $('panelPresets');
  const timeEntry = $('timeEntry');
  const helpPanel = $('helpPanel');
  const logo = $('logo');

  // ── Helpers ──
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }

  function saveSettings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        clockName, clockColor, fontName: selectedFont.name, timezone,
        is24h, mode, showTenths, showMiniClock, hideLeadingZero, fontSize, autoSize, displayStyle,
      }));
    } catch {}
  }

  function loadPresets() {
    try { return JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; } catch { return []; }
  }

  function savePresetsList(list) {
    try { localStorage.setItem(PRESETS_KEY, JSON.stringify(list)); } catch {}
  }

  function getTimeInZone(date, tz) {
    if (tz === 'local') return { hours: date.getHours(), minutes: date.getMinutes(), seconds: date.getSeconds(), ms: date.getMilliseconds() };
    const str = date.toLocaleString('en-US', { timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const p = str.split(':');
    return { hours: parseInt(p[0]) % 24, minutes: parseInt(p[1]), seconds: parseInt(p[2]), ms: date.getMilliseconds() };
  }

  function formatTime(value, show24h, showSec, showT, t, hideLZ, showMs) {
    const negative = value < 0;
    const abs = Math.abs(value);
    let totalSec, ms = 0;
    if (showMs) { totalSec = Math.floor(abs / 1000); ms = Math.floor((abs % 1000) / 10); }
    else { totalSec = abs; }
    let h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (!show24h && h > 12) h -= 12;
    if (!show24h && h === 0) h = 12;
    const hStr = hideLZ ? String(h) : String(h).padStart(2, '0');
    const mStr = String(m).padStart(2, '0');
    const sStr = String(s).padStart(2, '0');
    let result;
    if (showMs && h === 0) result = showSec ? `${mStr}:${sStr}` : `${mStr}`;
    else result = showSec ? `${hStr}:${mStr}:${sStr}` : `${hStr}:${mStr}`;
    if (showMs && showSec) result += '.' + String(ms).padStart(2, '0');
    else if (showT && showSec) result += '.' + t;
    return { text: result, negative };
  }

  function hexAlpha(hex, a) { return hex + Math.round(a * 255).toString(16).padStart(2, '0'); }

  // ── Timer helpers ──
  function startTimer() { timerStart = Date.now(); paused = false; }
  function pauseTimer() {
    if (timerStart !== null) { timerAcc += Date.now() - timerStart; timerStart = null; }
    paused = true;
  }
  function togglePause() { paused ? startTimer() : pauseTimer(); }
  function resetTimerFn(andStart) {
    timerAcc = 0; timerStart = andStart ? Date.now() : null;
    timerElapsedMs = 0; paused = !andStart;
  }

  // ── UI Visibility ──
  function resetHideTimer() {
    uiVisible = true;
    applyUiVisibility();
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => { uiVisible = false; applyUiVisibility(); }, AUTO_HIDE_DELAY);
  }

  function applyUiVisibility() {
    const cls = uiVisible ? '' : 'hidden';
    toolbar.className = 'toolbar ' + cls;
    modeBar.className = 'mode-bar ' + cls;
    clockNameEl.className = 'clock-name ' + cls;
    sizeControls.className = 'size-controls ' + cls;
    ntpStatusEl.className = 'ntp-status ' + cls;
    if (showMiniClock && mode !== 'clock') miniClockEl.className = 'mini-clock ' + cls;
    else miniClockEl.className = 'mini-clock hidden';
    timerControls.className = 'timer-controls ' + ((mode !== 'clock') ? cls : 'hidden');
    countdownPresetsEl.className = 'countdown-presets ' + ((mode === 'countdown') ? cls : 'hidden');
  }

  // ── NTP sync ──
  async function syncTime() {
    const apis = [
      { url: 'https://timeapi.io/api/time/current/zone?timeZone=UTC', parse: d => new Date(d.dateTime + 'Z').getTime() },
      { url: 'https://worldtimeapi.org/api/timezone/UTC', parse: d => new Date(d.utc_datetime).getTime() },
    ];
    for (const api of apis) {
      try {
        const before = Date.now();
        const res = await fetch(api.url);
        if (!res.ok) continue;
        const after = Date.now();
        const data = await res.json();
        const serverTime = api.parse(data);
        if (isNaN(serverTime)) continue;
        ntpOffset = serverTime - (before + (after - before) / 2);
        syncStatus = 'synced';
        updateNtpStatus();
        return;
      } catch { continue; }
    }
    ntpOffset = 0;
    syncStatus = 'local';
    updateNtpStatus();
  }

  function updateNtpStatus() {
    const dot = syncStatus === 'synced' ? '<span class="ntp-dot synced"></span>'
      : syncStatus === 'local' ? '<span class="ntp-dot local"></span>'
      : '<span class="ntp-dot syncing"></span>';
    const label = syncStatus === 'synced' ? `NTP synced (${ntpOffset > 0 ? '+' : ''}${ntpOffset}ms)`
      : syncStatus === 'local' ? 'Local clock' : 'Syncing...';
    ntpStatusEl.innerHTML = dot + ' ' + label;
  }

  // ── Auto-size (matches original ResizeObserver approach) ──
  function doAutoSize() {
    if (!autoSize || displayStyle !== 'digital') return;
    const containerW = document.body.clientWidth * 0.95;
    const tw = timeDisplay.scrollWidth;
    if (tw > 0) {
      const scale = containerW / tw;
      const newSize = Math.floor(fontSize * scale);
      const clamped = Math.max(30, Math.min(newSize, 800));
      if (Math.abs(clamped - fontSize) > 2) {
        fontSize = clamped;
        timeDisplay.style.fontSize = (fontSize * 0.6) + 'px';
      }
    }
  }

  // ── Build panels ──
  function buildColorPanel() {
    panelColor.innerHTML = '';
    COLORS.forEach(c => {
      const btn = document.createElement('button');
      btn.innerHTML = '<span class="swatch" style="background:' + c.value + '"></span>' + c.label;
      if (clockColor === c.value) { btn.classList.add('selected'); btn.style.color = c.value; }
      btn.onclick = () => { clockColor = c.value; closeAllPanels(); applyColor(); saveSettings(); };
      panelColor.appendChild(btn);
    });
  }

  function buildTzPanel() {
    panelTz.innerHTML = '';
    TIMEZONES.forEach(t => {
      const btn = document.createElement('button');
      btn.textContent = t.label + (t.value === 'local' ? '' : '  ' + t.value);
      if (timezone === t.value) { btn.classList.add('selected'); btn.style.color = clockColor; }
      btn.onclick = () => { timezone = t.value; closeAllPanels(); saveSettings(); };
      panelTz.appendChild(btn);
    });
  }

  function buildFontPanel() {
    panelFont.innerHTML = '';
    FONTS.forEach(f => {
      const btn = document.createElement('button');
      btn.textContent = f.label + '  12:34';
      btn.style.fontFamily = f.css;
      btn.style.fontWeight = f.weight;
      if (selectedFont.name === f.name) { btn.classList.add('selected'); btn.style.color = clockColor; }
      btn.onclick = () => { selectedFont = f; closeAllPanels(); applyFont(); saveSettings(); };
      panelFont.appendChild(btn);
    });
  }

  function buildPresetPanel() {
    const presets = loadPresets();
    panelPresets.innerHTML = '';
    if (presets.length === 0) {
      const p = document.createElement('button');
      p.textContent = 'No presets saved yet';
      p.style.cursor = 'default';
      panelPresets.appendChild(p);
      return;
    }
    presets.forEach(preset => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:4px';
      const btn = document.createElement('button');
      btn.innerHTML = '<span class="swatch" style="background:' + preset.clockColor + '"></span>' + preset.name;
      btn.style.flex = '1';
      btn.onclick = () => {
        clockName = preset.clockName; clockColor = preset.clockColor;
        selectedFont = FONTS.find(f => f.name === preset.fontName) || FONTS[0];
        timezone = preset.timezone; is24h = preset.is24h; mode = preset.mode;
        closeAllPanels(); applyColor(); applyFont(); applyMode(); saveSettings();
      };
      const del = document.createElement('button');
      del.textContent = '✕';
      del.style.cssText = 'color:rgba(255,255,255,0.2);padding:4px 8px;flex-shrink:0';
      del.onmouseenter = () => del.style.color = '#ef4444';
      del.onmouseleave = () => del.style.color = 'rgba(255,255,255,0.2)';
      del.onclick = () => {
        const updated = loadPresets().filter(p => p.id !== preset.id);
        savePresetsList(updated);
        buildPresetPanel();
      };
      row.appendChild(btn);
      row.appendChild(del);
      panelPresets.appendChild(row);
    });
  }

  function closeAllPanels() {
    panelColor.classList.remove('open');
    panelTz.classList.remove('open');
    panelFont.classList.remove('open');
    panelPresets.classList.remove('open');
    helpPanel.classList.remove('open');
  }

  function togglePanel(panel, buildFn) {
    const wasOpen = panel.classList.contains('open');
    closeAllPanels();
    if (!wasOpen) { buildFn(); panel.classList.add('open'); }
  }

  // ── Apply visual state ──
  function applyColor() {
    document.documentElement.style.setProperty('--active-color', clockColor);
    document.documentElement.style.setProperty('--active-color-dim', hexAlpha(clockColor, 0.5));
    $('helpTitle').style.color = clockColor;
    buildHelpBody();
  }

  function applyFont() {
    timeDisplay.style.fontFamily = selectedFont.css;
    timeDisplay.style.fontWeight = selectedFont.weight;
  }

  function applyMode() {
    modeBar.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
      b.style.color = b.dataset.mode === mode ? clockColor : 'rgba(255,255,255,0.2)';
      b.style.borderColor = b.dataset.mode === mode ? hexAlpha(clockColor, 0.5) : 'rgba(255,255,255,0.1)';
    });
    applyUiVisibility();
  }

  function buildHelpBody() {
    const keys = [
      ['C', 'Show real-time clock'], ['S', 'Start count-up timer'],
      ['D', 'Enter countdown time (hh:mm:ss)'], ['M', 'Enter target time of day'],
      ['R', 'Restart timer'], ['P / Space', 'Pause / Resume'],
      ['T', 'Toggle tenths'], ['H', 'Toggle 12/24 hour'],
      ['Q', 'Toggle mini-clock'], ['Z', 'Toggle leading zeroes'],
      ['I', 'Change +/- sign'], ['N', 'Edit clock name'],
      ['K', 'Cycle display color'], ['0-9', 'Quick countdown (minutes)'],
      ['⇧ 0-9', 'Quick countdown (×5 min)'], ['⌃ 0-9', 'Quick countdown (×30 min)'],
      ['⇧⌃ 0-9', 'Quick countdown (hours)'], ['-/=', 'Adjust ±5 seconds'],
      ['⇧ -/=', 'Adjust ±30 seconds'], ['⌃ -/=', 'Adjust ±60 seconds'],
      ['F', 'Toggle font picker'], ['A', 'Toggle auto-fit size'],
      ['L', 'Toggle logo'], ['↑/↓', 'Adjust font size (manual)'],
    ];
    $('helpBody').innerHTML = keys.map(([k, d]) =>
      `<div class="row"><span class="key" style="color:${hexAlpha(clockColor, 0.7)}">${k}</span><span class="desc">${d}</span></div>`
    ).join('');
  }

  // ── Analog clock rendering ──
  function renderAnalog(hours, minutes, seconds, color, digitalTime, ampm) {
    const cx = 150, cy = 150, r = 140;
    const secA = (seconds / 60) * 360 - 90;
    const minA = ((minutes + seconds / 60) / 60) * 360 - 90;
    const hourA = (((hours % 12) + minutes / 60) / 12) * 360 - 90;
    const rad = a => a * Math.PI / 180;
    const end = (a, l) => ({ x: cx + l * Math.cos(rad(a)), y: cy + l * Math.sin(rad(a)) });
    const hEnd = end(hourA, r * 0.5), mEnd = end(minA, r * 0.7), sEnd = end(secA, r * 0.85);

    let svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${hexAlpha(color, 0.25)}" stroke-width="5"/>`;

    // Ticks
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * 360 - 90;
      const isHr = i % 5 === 0;
      const oR = r - 2, iR = isHr ? r - 16 : r - 7;
      const p1 = end(a, iR), p2 = end(a, oR);
      svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${isHr ? hexAlpha(color, 0.56) : hexAlpha(color, 0.25)}" stroke-width="${isHr ? 3.9 : 2}" stroke-linecap="round"/>`;
    }

    // Hour numbers
    for (let i = 1; i <= 12; i++) {
      const a = (i / 12) * 360 - 90;
      const p = end(a, r - 26);
      svg += `<text x="${p.x}" y="${p.y}" fill="${hexAlpha(color, 0.44)}" font-size="18" font-family="${selectedFont.css}" font-weight="${selectedFont.weight}" text-anchor="middle" dominant-baseline="central">${i}</text>`;
    }

    // Hands
    svg += `<line x1="${cx}" y1="${cy}" x2="${hEnd.x}" y2="${hEnd.y}" stroke="${color}" stroke-width="7.5" stroke-linecap="round"/>`;
    svg += `<line x1="${cx}" y1="${cy}" x2="${mEnd.x}" y2="${mEnd.y}" stroke="${color}" stroke-width="5" stroke-linecap="round"/>`;
    svg += `<line x1="${cx}" y1="${cy}" x2="${sEnd.x}" y2="${sEnd.y}" stroke="${hexAlpha(color, 0.8)}" stroke-width="2" stroke-linecap="round"/>`;
    svg += `<circle cx="${cx}" cy="${cy}" r="6" fill="${color}"/>`;

    // Digital time overlay
    svg += `<text x="${cx}" y="${cy + 38}" fill="${hexAlpha(color, 0.56)}" font-size="18" font-family="${selectedFont.css}" font-weight="${selectedFont.weight}" text-anchor="middle" dominant-baseline="central">${digitalTime}</text>`;
    if (ampm) svg += `<text x="${cx}" y="${cy + 54}" fill="${hexAlpha(color, 0.31)}" font-size="10" font-family="${selectedFont.css}" text-anchor="middle" dominant-baseline="central">${ampm}</text>`;

    analogSvg.innerHTML = svg;
    const sz = Math.min(fontSize * 2, 600);
    analogSvg.setAttribute('width', sz);
    analogSvg.setAttribute('height', sz);
  }

  // ── Main render loop ──
  function render() {
    const now = new Date(Date.now() + ntpOffset);
    const tz = getTimeInZone(now, timezone);
    const currentSec = tz.hours * 3600 + tz.minutes * 60 + tz.seconds;
    const tenthsVal = Math.floor(now.getMilliseconds() / 100);

    // Update timer elapsed
    timerElapsedMs = timerAcc + (timerStart !== null ? Date.now() - timerStart : 0);

    // Compute display time
    let dt;
    if (mode === 'clock') dt = formatTime(currentSec, is24h, true, showTenths, tenthsVal);
    else if (mode === 'countup') dt = formatTime(timerElapsedMs, true, true, false, 0, hideLeadingZero, true);
    else if (mode === 'countdown') {
      const remainingMs = countdownFrom * 1000 - timerElapsedMs;
      dt = formatTime(remainingMs, true, true, false, 0, hideLeadingZero, true);
    } else if (mode === 'countto' && countToTarget !== null) {
      const diffSec = Math.round((countToTarget - Date.now()) / 1000);
      dt = formatTime(diffSec, true, true, false, 0, hideLeadingZero);
    } else {
      dt = { text: '00:00:00', negative: false };
    }

    // Active color (overtime = red, warning = yellow)
    const countdownRemMs = countdownFrom * 1000 - timerElapsedMs;
    const isOvertime = mode === 'countdown' && countdownRemMs < 0;
    const isWarning = mode === 'countdown' && countdownRemMs <= 30000 && countdownRemMs > 0;
    const activeColor = isOvertime ? '#dc2626' : isWarning ? '#eab308' : clockColor;

    if (displayStyle === 'digital') {
      analogContainer.style.display = 'none';
      timeDisplay.style.display = '';
      ampmDisplay.style.display = (mode === 'clock' && !is24h) ? '' : 'none';

      let text = '';
      if (mode !== 'clock' && dt.negative) text += (sign === '+' ? '−' : '+');
      else if (mode !== 'clock' && !dt.negative) text += '<span style="opacity:0.3">' + (sign === '+' ? '+' : '−') + '</span>';
      text += dt.text;
      timeDisplay.innerHTML = text;
      timeDisplay.style.color = activeColor;
      timeDisplay.style.fontSize = (fontSize * 0.6) + 'px';
      timeDisplay.classList.toggle('pulse', isOvertime);

      if (mode === 'clock' && !is24h) {
        ampmDisplay.textContent = tz.hours >= 12 ? 'PM' : 'AM';
        ampmDisplay.style.color = hexAlpha(clockColor, 0.5);
      }
    } else {
      timeDisplay.style.display = 'none';
      ampmDisplay.style.display = 'none';
      analogContainer.style.display = '';
      const ampm = (mode === 'clock' && !is24h) ? (tz.hours >= 12 ? 'PM' : 'AM') : null;
      renderAnalog(tz.hours, tz.minutes, tz.seconds, activeColor, dt.text, ampm);
    }

    // Clock name
    if (!editingName) {
      const defaultN = mode === 'countup' ? 'Count Up' : mode === 'countdown' ? 'Countdown' : mode === 'countto' ? 'Count To' : 'Clock';
      const name = clockName || defaultN;
      clockNameEl.innerHTML = '';
      const span = document.createElement('span');
      span.textContent = name;
      span.style.color = hexAlpha(clockColor, 0.4);
      span.title = 'Click to rename (N)';
      span.onclick = () => startEditName();
      clockNameEl.appendChild(span);
      // Position above time
      clockNameEl.style.top = 'calc(50% - ' + (fontSize * 0.6 * 0.55 + 30) + 'px)';
      clockNameEl.style.left = '50%';
      clockNameEl.style.transform = 'translateX(-50%)';
    }

    // Mini clock
    if (showMiniClock && mode !== 'clock') {
      miniClockEl.textContent = formatTime(currentSec, is24h, true).text;
      miniClockEl.style.color = hexAlpha(clockColor, 0.4);
    }

    // Pause button label
    $('btnPause').textContent = paused ? 'Resume' : 'Pause';

    // Mode bar colors
    modeBar.querySelectorAll('button').forEach(b => {
      const isActive = b.dataset.mode === mode;
      b.style.color = isActive ? activeColor : 'rgba(255,255,255,0.2)';
      b.style.borderColor = isActive ? hexAlpha(activeColor, 0.5) : 'rgba(255,255,255,0.1)';
    });

    doAutoSize();
  }

  function startEditName() {
    editingName = true;
    clockNameEl.innerHTML = '';
    const inp = document.createElement('input');
    inp.value = clockName;
    inp.placeholder = mode === 'countup' ? 'Count Up' : mode === 'countdown' ? 'Countdown' : 'Clock';
    inp.style.color = hexAlpha(clockColor, 0.6);
    inp.onblur = () => finishEditName(inp.value);
    inp.onkeydown = (e) => { if (e.key === 'Enter' || e.key === 'Escape') finishEditName(inp.value); };
    clockNameEl.appendChild(inp);
    inp.focus();
    inp.select();
  }

  function finishEditName(val) {
    clockName = val;
    editingName = false;
    saveSettings();
  }

  // ── Keyboard handler ──
  function handleKey(e) {
    if (editingName) {
      if (e.key === 'Enter' || e.key === 'Escape') {
        const inp = clockNameEl.querySelector('input');
        if (inp) finishEditName(inp.value);
      }
      return;
    }

    if (enteringTime) {
      if (e.key === 'Enter') {
        const parts = timeInput.split(':').map(Number);
        if (enterMode === 'countdown') {
          let totalSec = 0;
          if (parts.length === 3) totalSec = parts[0] * 3600 + parts[1] * 60 + parts[2];
          else if (parts.length === 2) totalSec = parts[0] * 60 + parts[1];
          else totalSec = parts[0] * 60;
          countdownFrom = totalSec;
          mode = 'countdown';
          resetTimerFn(true);
        } else {
          if (parts.length >= 2) {
            const target = new Date();
            target.setHours(parts[0], parts[1], parts[2] || 0, 0);
            if (target.getTime() < Date.now()) target.setDate(target.getDate() + 1);
            countToTarget = target.getTime();
            mode = 'countto';
            paused = false;
          }
        }
        enteringTime = false; timeInput = '';
        timeEntry.classList.remove('open');
        applyMode(); saveSettings();
        return;
      }
      if (e.key === 'Escape') { enteringTime = false; timeInput = ''; timeEntry.classList.remove('open'); return; }
      if (e.key === 'Backspace') { timeInput = timeInput.slice(0, -1); $('timeEntryInput').textContent = timeInput || '—:——:——'; return; }
      if (/[\d:]/.test(e.key)) { timeInput += e.key; $('timeEntryInput').textContent = timeInput || '—:——:——'; }
      return;
    }

    const key = e.key.toLowerCase();

    if (key === 'c') { mode = 'clock'; paused = false; applyMode(); saveSettings(); }
    else if (key === 's') { mode = 'countup'; resetTimerFn(true); applyMode(); saveSettings(); }
    else if (key === 'd') { enteringTime = true; enterMode = 'countdown'; timeInput = ''; showTimeEntry('Enter countdown (hh:mm:ss)'); }
    else if (key === 'm') { enteringTime = true; enterMode = 'countto'; timeInput = ''; showTimeEntry('Enter target time (hh:mm:ss)'); }
    else if (key === 'r') { if (mode === 'countdown' || mode === 'countup') resetTimerFn(true); }
    else if (key === 'p' || key === ' ') { e.preventDefault(); togglePause(); }
    else if (key === 't') { showTenths = !showTenths; saveSettings(); }
    else if (key === 'h') { is24h = !is24h; saveSettings(); }
    else if (key === 'q') { showMiniClock = !showMiniClock; applyUiVisibility(); saveSettings(); }
    else if (key === 'z') { hideLeadingZero = !hideLeadingZero; saveSettings(); }
    else if (key === 'i') { sign = sign === '+' ? '-' : '+'; }
    else if (key === 'f') { togglePanel(panelFont, buildFontPanel); }
    else if (key === 'n') { startEditName(); }
    else if (key === 'k') {
      const idx = COLORS.findIndex(c => c.value === clockColor);
      clockColor = COLORS[(idx + 1) % COLORS.length].value;
      applyColor(); saveSettings();
    }
    else if (key === 'a') { autoSize = !autoSize; updateAutoSizeBtn(); saveSettings(); }
    else if (key === 'l') { logoVisible = !logoVisible; logo.style.display = logoVisible ? '' : 'none'; }
    else if (key === 'arrowup') { autoSize = false; fontSize = Math.min(fontSize + 10, 800); updateAutoSizeBtn(); }
    else if (key === 'arrowdown') { autoSize = false; fontSize = Math.max(fontSize - 10, 30); updateAutoSizeBtn(); }
    else if (key === '-') {
      const adj = e.ctrlKey ? 60 : e.shiftKey ? 30 : 5;
      timerAcc += adj * 1000;
    } else if (key === '=') {
      const adj = e.ctrlKey ? 60 : e.shiftKey ? 30 : 5;
      timerAcc = Math.max(0, timerAcc - adj * 1000);
    } else if (/\d/.test(key)) {
      const d = key === '0' ? 10 : parseInt(key);
      let minutes = d;
      if (e.shiftKey && e.ctrlKey) countdownFrom = d * 3600;
      else if (e.ctrlKey) countdownFrom = d * 30 * 60;
      else if (e.shiftKey) countdownFrom = d * 5 * 60;
      else countdownFrom = minutes * 60;
      mode = 'countdown'; resetTimerFn(true); applyMode(); saveSettings();
    }
  }

  function showTimeEntry(label) {
    $('timeEntryLabel').textContent = label;
    $('timeEntryInput').textContent = '—:——:——';
    $('timeEntryInput').style.color = clockColor;
    timeEntry.classList.add('open');
  }

  function updateAutoSizeBtn() {
    const btn = $('btnAutoSize');
    btn.textContent = autoSize ? 'AUTO' : 'FIXED';
    btn.classList.toggle('active', autoSize);
    $('sizeLabel').textContent = autoSize ? 'auto' : Math.round(fontSize * 0.6) + 'px';
  }

  // ── Button handlers ──
  $('btnColor').onclick = (e) => { e.stopPropagation(); togglePanel(panelColor, buildColorPanel); };
  $('btnTz').onclick = (e) => { e.stopPropagation(); togglePanel(panelTz, buildTzPanel); };
  $('btnFont').onclick = (e) => { e.stopPropagation(); togglePanel(panelFont, buildFontPanel); };
  $('btnHelp').onclick = (e) => { e.stopPropagation(); const wasOpen = helpPanel.classList.contains('open'); closeAllPanels(); if (!wasOpen) helpPanel.classList.add('open'); };
  $('btnAnalog').onclick = () => { displayStyle = displayStyle === 'digital' ? 'analog' : 'digital'; saveSettings(); };
  $('btnPresetSave').onclick = () => {
    const name = prompt('Preset name:', clockName || 'Clock');
    if (!name) return;
    const presets = loadPresets();
    presets.push({ id: Date.now().toString(), name, clockName, clockColor, fontName: selectedFont.name, timezone, is24h, mode });
    savePresetsList(presets);
  };
  $('btnPresetLoad').onclick = (e) => { e.stopPropagation(); togglePanel(panelPresets, buildPresetPanel); };
  $('btnPause').onclick = () => togglePause();
  $('btnReset').onclick = () => resetTimerFn(true);
  $('btnSizeUp').onclick = () => { autoSize = false; fontSize = Math.min(fontSize + 10, 800); updateAutoSizeBtn(); saveSettings(); };
  $('btnSizeDown').onclick = () => { autoSize = false; fontSize = Math.max(fontSize - 10, 30); updateAutoSizeBtn(); saveSettings(); };
  $('btnAutoSize').onclick = () => { autoSize = !autoSize; updateAutoSizeBtn(); saveSettings(); };

  // Mode bar buttons
  modeBar.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      mode = b.dataset.mode;
      if (mode === 'countup' || mode === 'countdown') resetTimerFn(true);
      applyMode(); saveSettings();
    };
  });

  // Countdown preset buttons
  countdownPresetsEl.querySelectorAll('button').forEach(b => {
    b.onclick = () => { countdownFrom = parseInt(b.dataset.sec); resetTimerFn(true); };
  });

  // Close panels on body click
  document.body.addEventListener('click', () => closeAllPanels());

  // ── Activity listeners ──
  ['mousemove', 'keydown', 'touchstart'].forEach(evt => window.addEventListener(evt, resetHideTimer));
  window.addEventListener('keydown', handleKey);

  // ── Init ──
  applyColor();
  applyFont();
  applyMode();
  updateAutoSizeBtn();
  resetHideTimer();
  syncTime();
  setInterval(syncTime, 60000);

  // Render loop — 30fps for smooth ms display
  setInterval(render, 33);

  // Auto-size on resize (ResizeObserver like original broadcast-brilliance)
  new ResizeObserver(() => { if (autoSize) doAutoSize(); }).observe(document.body);

})();
</script>
</body>
</html>
