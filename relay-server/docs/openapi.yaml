          description: Triage analysis

  /api/support/tickets:
    get:
      tags: [Support]
      summary: List support tickets
      operationId: listSupportTickets
      security:
        - AdminBearer: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Ticket list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupportTicket'
                  total:
                    type: integer
    post:
      tags: [Support]
      summary: Create support ticket
      operationId: createSupportTicket
      description: Rate limited — 5 requests per 60 seconds.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Ticket details and diagnostics
      responses:
        '200':
          description: Ticket created

  /api/support/tickets/{ticketId}:
    get:
      tags: [Support]
      summary: Get support ticket with timeline
      operationId: getSupportTicket
      security:
        - AdminBearer: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full ticket with timeline
    put:
      tags: [Support]
      summary: Update support ticket
      operationId: updateSupportTicket
      security:
        - AdminBearer: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, resolved, closed]
                category:
                  type: string
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                assignee:
                  type: string
      responses:
        '200':
          description: Ticket updated

  /api/support/tickets/{ticketId}/updates:
    post:
      tags: [Support]
      summary: Add update to support ticket
      operationId: addTicketUpdate
      security:
        - AdminBearer: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                attachments:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Update added

  # ── INTERNAL ──────────────────────────────────────────────────────────────────

  /api/internal/backups/snapshot:
    post:
      tags: [Internal]
      summary: Trigger a manual database snapshot
      operationId: createSnapshot
      security:
        - AdminBearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
      responses:
        '200':
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  snapshot:
                    type: object

  /api/docs:
    get:
      tags: [Internal]
      summary: Serve OpenAPI specification
      operationId: getApiDocs
      description: Returns the OpenAPI 3.0 specification as JSON.
      responses:
        '200':
          description: OpenAPI spec
          content:
            application/json:
              schema:
                type: object

  # ── REAL-TIME ─────────────────────────────────────────────────────────────────

  /api/dashboard/stream:
    get:
      tags: [Internal]
      summary: Server-Sent Events stream for live dashboard updates
      operationId: dashboardStream
      description: |
        Returns a `text/event-stream` SSE connection. Requires admin authentication
        (cookie session or Bearer token). Events include:
        - `connected` — initial connection confirmation
        - `status` — church connection status changes
        - `alert` — new alerts
        - `message` — new chat messages
        - `heartbeat` — keepalive every 30 seconds
      security:
        - AdminBearer: []
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  x-websocket:
    /ws:
      description: |
        WebSocket relay endpoint (same port as HTTP, path `/`).

        **Church client registration:**
        ```json
        { "type": "register", "token": "<church_app_jwt>" }
        ```

        **Controller registration:**
        ```json
        { "type": "controller", "key": "<admin_api_key>" }
        ```

        **Relay message (controller → church):**
        ```json
        { "type": "command", "churchId": "...", "command": "cut", "params": {} }
        ```

        **Status update (church → relay → controller):**
        ```json
        { "type": "status", "churchId": "...", "data": { ... } }
        ```

responses:
  Unauthorized:
    description: Missing or invalid authentication
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
  Forbidden:
    description: Insufficient permissions
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
  NotFound:
    description: Resource not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
