      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, triggerType, actions]
              properties:
                name:
                  type: string
                triggerType:
                  type: string
                triggerConfig:
                  type: object
                actions:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Rule created
        '400':
          description: Invalid rule
        '402':
          description: Rule limit reached or tier too low

  /api/churches/{churchId}/automation/{ruleId}:
    put:
