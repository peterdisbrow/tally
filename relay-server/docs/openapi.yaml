        '404':
          description: Church not found
    delete:
      tags: [Churches]
      summary: Delete church and all data (cascade)
      operationId: deleteChurch
      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Church deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  name:
                    type: string

  /api/churches/{churchId}/status:
    get:
      tags: [Churches]
      summary: Get church connection status
      operationId: getChurchStatus
      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  connected:
                    type: boolean
                  status:
                    type: string
                  lastSeen:
                    type: string
                    format: date-time
                    nullable: true

  /api/churches/{churchId}/billing:
    put:
      tags: [Billing]
      summary: Manually update church billing
      operationId: updateChurchBilling
      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: string
                  enum: [connect, plus, pro, managed, event]
                status:
                  type: string
                  enum: [trialing, active, past_due, canceled, inactive]
                billingInterval:
                  type: string
                  enum: [monthly, annual]
      responses:
        '200':
          description: Billing updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  churchId:
                    type: string
                  billing:
                    $ref: '#/components/schemas/BillingStatus'

  # ── COMMANDS ──────────────────────────────────────────────────────────────────

  /api/command:
    post:
      tags: [Commands]
      summary: Send command to a church client
      operationId: sendCommand
      security:
        - AdminBearer: []
      description: |
        Rate limited — max 10 commands per second.
        If the church is offline, the command is queued for up to 30 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [churchId, command]
              properties:
                churchId:
                  type: string
                command:
                  type: string
                  description: Command name (e.g. "program", "preview", "cut")
                params:
                  type: object
      responses:
        '200':
          description: Command sent or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                  queued:
                    type: boolean
                  messageId:
                    type: string
        '402':
          description: Billing access denied
        '429':
          description: Rate limit exceeded
        '503':
          description: Church not connected and queue full

  /api/broadcast:
    post:
      tags: [Commands]
      summary: Broadcast command to all connected churches
      operationId: broadcastCommand
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                params:
                  type: object
      responses:
        '200':
          description: Broadcast result
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: integer
                    description: Number of churches that received the command
                  total:
                    type: integer
                    description: Total registered churches

