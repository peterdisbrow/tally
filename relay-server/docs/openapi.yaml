      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationRule'
      responses:
        '200':
          description: Rule updated
    delete:
      tags: [Automation]
      summary: Delete AutoPilot rule
      operationId: deleteAutomationRule
