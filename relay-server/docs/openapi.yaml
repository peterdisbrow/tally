openapi: 3.0.3
info:
  title: Tally Connect Relay Server API
  version: 1.1.0
  description: |
    REST API for the Tally Connect relay server, which bridges ATEM/Telegram controllers
    to church client apps. Includes church management, billing, automation, real-time
    relay, and portal APIs.

    ## Authentication

    Four authentication schemes are in use:

    | Scheme | Header | Used By |
    |--------|--------|---------|
    | Admin JWT | `Authorization: Bearer <token>` or `x-admin-jwt: <token>` | Admin endpoints |
    | Church App JWT | `Authorization: Bearer <token>` | Church app endpoints |
    | Reseller API Key | `x-reseller-key: <key>` | Reseller API endpoints |
    | Admin API Key | `x-api-key: <key>` | Legacy / internal |

    ## Billing Tiers

    | Tier | Description |
    |------|-------------|
    | `connect` | Basic tier — free trial, limited features |
    | `plus` | Adds AutoPilot, on-call, command log, monthly reports |
    | `pro` | Adds Planning Center, advanced sessions |
    | `managed` | Full-service managed tier |
    | `event` | Time-limited one-off event account |

    ## WebSocket

    The relay WebSocket is available at `wss://<host>/` (same HTTP server).
    Church clients authenticate by sending `{ type: "register", token: "<jwt>" }` after
    connecting. Controllers authenticate with `{ type: "controller", key: "<admin_key>" }`.
    All relay messages follow `{ type: string, churchId?: string, command?: string, params?: object }`.

    ## Real-Time Dashboard Stream

    `GET /api/dashboard/stream` opens a Server-Sent Events (SSE) connection for live
    dashboard updates. Clients must be authenticated as admin (cookie or Bearer).

servers:
  - url: https://your-relay.up.railway.app
    description: Production (Railway)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service health and status
  - name: Admin Auth
    description: Admin user authentication and management
  - name: Church Auth
    description: Church app authentication and self-service onboarding
  - name: Email Verification
    description: Email verification and password reset flows
  - name: Churches
    description: Church management (admin)
  - name: Church App
    description: Church app profile, chat, and preservice check
  - name: Billing
    description: Stripe billing, checkout, and webhook
  - name: Commands
    description: Command dispatch to church clients
  - name: Automation
    description: AutoPilot rules, presets, and command log
  - name: Sessions
    description: Session history, timeline, schedule, and reports
  - name: Chat
    description: Admin and church-side chat with AI
  - name: Onboarding
    description: AI-guided onboarding chat
  - name: Stream Platforms
    description: YouTube and Facebook OAuth / stream keys
  - name: Slack
    description: Slack webhook integration
  - name: Telegram
    description: Telegram bot integration and TD management
  - name: Planning Center
    description: Planning Center integration
  - name: On-Call
    description: On-call rotation management
  - name: Maintenance
    description: Maintenance window scheduling
  - name: Guest Tokens
    description: Temporary guest access tokens
  - name: Events
    description: Time-limited event church accounts
  - name: Resellers
    description: Reseller management (admin) and reseller self-service API
  - name: Support
    description: Support tickets and triage
  - name: Status
    description: Public status page components and incidents
  - name: Internal
    description: Internal/operational endpoints

components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT obtained from POST /api/admin/login
    ChurchAppBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Church app JWT obtained from POST /api/church/app/login
    ResellerKey:
      type: apiKey
      in: header
      name: x-reseller-key
      description: Reseller API key issued during reseller creation
    AdminApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Legacy admin API key (ADMIN_API_KEY env var)

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
      required: [error]

    Church:
      type: object
      properties:
        churchId:
          type: string
          format: uuid
        name:
          type: string
        connected:
          type: boolean
        status:
          type: string
          enum: [ok, warning, error, unknown]
        lastSeen:
          type: string
          format: date-time
          nullable: true
        registrationCode:
          type: string
        token:
          type: string
        church_type:
          type: string
          enum: [standard, event]
        billing_tier:
          type: string
          enum: [connect, plus, pro, managed, event]
        billing_status:
          type: string
          enum: [trialing, active, past_due, canceled, inactive]
        reseller_id:
          type: string
          nullable: true

    BillingStatus:
      type: object
      properties:
        tier:
          type: string
          enum: [connect, plus, pro, managed, event]
        status:
          type: string
          enum: [trialing, active, past_due, canceled, inactive]
        billingInterval:
          type: string
          enum: [monthly, annual, one_time]
          nullable: true
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        bypassed:
          type: boolean

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [super_admin, admin, engineer, sales]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    Message:
      type: object
      properties:
        id:
          type: string
        churchId:
          type: string
        sender:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    AutomationRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        triggerType:
          type: string
        triggerConfig:
          type: object
          nullable: true
        actions:
          type: array
          items:
            type: object
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Preset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        data:
          type: object

    Session:
      type: object
      properties:
        id:
          type: string
        churchId:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          description: Duration in seconds

    SupportTicket:
      type: object
      properties:
        ticketId:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        category:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        subject:
          type: string
        createdAt:
          type: string
          format: date-time

    Reseller:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brandName:
          type: string
          nullable: true
        supportEmail:
          type: string
          format: email
          nullable: true
        churchLimit:
          type: integer
          nullable: true
        active:
          type: boolean
        apiKey:
          type: string
          description: Only returned on creation

paths:
  # ── HEALTH ───────────────────────────────────────────────────────────────────

  /:
    get:
      tags: [Health]
      summary: Root health check
      operationId: getRoot
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: tally-relay
                  version:
                    type: string
                    example: 1.1.0
                  churches:
                    type: integer
                    description: Number of registered churches
                  controllers:
                    type: integer
                    description: Number of connected controller WebSocket clients

  /api/health:
    get:
      tags: [Health]
      summary: Detailed health and uptime
      operationId: getHealth
      responses:
        '200':
          description: Health info
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  version:
                    type: string
                  build:
                    type: string
                  uptime:
                    type: number
                    description: Uptime in seconds
                  registeredChurches:
                    type: integer
                  connectedChurches:
                    type: integer
                  controllers:
                    type: integer
                  totalMessagesRelayed:
                    type: integer

  /api/status:
    get:
      tags: [Status]
      summary: Machine-readable service status
      operationId: getStatus
      responses:
        '200':
          description: Operational or degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [operational, degraded, partial_outage, major_outage]
                  timestamp:
                    type: string
                    format: date-time
                  components:
                    type: object
        '503':
          description: Major outage

  /api/status/components:
    get:
      tags: [Status]
      summary: List status page components
      operationId: getStatusComponents
      responses:
        '200':
          description: Component list
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedAt:
                    type: string
                    format: date-time
                  components:
                    type: array
                    items:
                      type: object

  /api/status/incidents:
    get:
      tags: [Status]
      summary: List status incidents
      operationId: getStatusIncidents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Incident list

  /api/status/run-checks:
    post:
      tags: [Status]
      summary: Trigger status checks (admin)
      operationId: runStatusChecks
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Checks completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  checkedAt:
                    type: string
                    format: date-time

  # ── ADMIN AUTH ────────────────────────────────────────────────────────────────

  /api/admin/login:
    post:
      tags: [Admin Auth]
      summary: Admin login
      operationId: adminLogin
      description: Rate limited — 5 requests per 15 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/AdminUser'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded

  /api/admin/me:
    get:
      tags: [Admin Auth]
      summary: Get current admin user profile
      operationId: getAdminMe
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Admin profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/me/password:
    put:
      tags: [Admin Auth]
      summary: Change own admin password
      operationId: changeAdminPassword
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/users:
    get:
      tags: [Admin Auth]
      summary: List admin users (super_admin only)
      operationId: listAdminUsers
      security:
        - AdminBearer: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
    post:
      tags: [Admin Auth]
      summary: Create admin user (super_admin only)
      operationId: createAdminUser
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                role:
                  type: string
                  enum: [super_admin, admin, engineer, sales]
      responses:
        '201':
          description: User created
        '400':
          description: Validation error

  /api/admin/users/{userId}:
    put:
      tags: [Admin Auth]
      summary: Update admin user (super_admin only)
      operationId: updateAdminUser
      security:
        - AdminBearer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
                  enum: [super_admin, admin, engineer, sales]
                active:
                  type: boolean
      responses:
        '200':
          description: User updated
    delete:
      tags: [Admin Auth]
      summary: Deactivate admin user (super_admin only)
      operationId: deleteAdminUser
      security:
        - AdminBearer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deactivated
        '400':
          description: Cannot delete last super_admin

  /api/admin/users/{userId}/password:
    put:
      tags: [Admin Auth]
      summary: Reset admin user password (super_admin only)
      operationId: resetAdminUserPassword
      security:
        - AdminBearer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset

  /api/admin/ai-usage:
    get:
      tags: [Admin Auth]
      summary: AI usage analytics (last 30 days)
      operationId: getAiUsage
      security:
        - AdminBearer: []
      responses:
        '200':
          description: AI usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      total_requests:
                        type: integer
                      input_tokens:
                        type: integer
                      output_tokens:
                        type: integer
                      cost_usd:
                        type: number
                      cache_hits:
                        type: integer
                  byChurch:
                    type: array
                    items:
                      type: object
                  byFeature:
                    type: array
                    items:
                      type: object

  # ── CHURCH AUTH ───────────────────────────────────────────────────────────────

  /api/church/app/onboard:
    post:
      tags: [Church Auth]
      summary: Church self-service onboarding / signup
      operationId: churchOnboard
      description: |
        Rate limited — 10 requests per 60 minutes.
        Creates a new church account with optional billing checkout. Returns a JWT for
        immediate app access plus billing status. If billing is enabled, `checkoutUrl`
        will be populated for redirect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  description: Church name
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                tier:
                  type: string
                  enum: [connect, plus, pro, managed, event]
                  default: connect
                billingInterval:
                  type: string
                  enum: [monthly, annual]
                  default: monthly
                tosAcceptedAt:
                  type: string
                  format: date-time
                referralCode:
                  type: string
      responses:
        '200':
          description: Onboarding successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: boolean
                  churchId:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  registrationCode:
                    type: string
                  token:
                    type: string
                  tokenExpiresIn:
                    type: string
                  billing:
                    type: object
                    properties:
                      required:
                        type: boolean
                      status:
                        type: string
                      tier:
                        type: string
                      billingInterval:
                        type: string
                      trialEndsAt:
                        type: string
                        format: date-time
                        nullable: true
                  checkoutUrl:
                    type: string
                    nullable: true
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/church/app/login:
    post:
      tags: [Church Auth]
      summary: Church app login
      operationId: churchAppLogin
      description: Rate limited — 5 requests per 15 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  tokenType:
                    type: string
                    example: church_app
                  tokenExpiresIn:
                    type: string
                  church:
                    type: object
                    properties:
                      churchId:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                  billing:
                    $ref: '#/components/schemas/BillingStatus'
        '401':
          description: Invalid credentials
        '402':
          description: Billing required and not active

  /api/church/app/me:
    get:
      tags: [Church Auth]
      summary: Get church app profile
      operationId: getChurchAppMe
      security:
        - ChurchAppBearer: []
      responses:
        '200':
          description: Church profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  churchId:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  connected:
                    type: boolean
                  status:
                    type: string
                  lastSeen:
                    type: string
                    format: date-time
                    nullable: true
                  notifications:
                    type: object
                  tds:
                    type: array
                    items:
                      type: object
                  timezone:
                    type: string
                  audio_via_atem:
                    type: boolean
    put:
      tags: [Church Auth]
      summary: Update church app profile / settings
      operationId: updateChurchAppMe
      security:
        - ChurchAppBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                phone:
                  type: string
                location:
                  type: string
                notes:
                  type: string
                notifications:
                  type: object
                telegramChatId:
                  type: string
                engineerProfile:
                  type: object
                currentPassword:
                  type: string
                  description: Required when changing password
                newPassword:
                  type: string
                  minLength: 8
                audioViaAtem:
                  type: boolean
      responses:
        '200':
          description: Profile updated

  /api/church/app/reset-password:
    post:
      tags: [Church Auth]
      summary: Admin-initiated church password reset
      operationId: adminResetChurchPassword
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /api/leads/capture:
    post:
      tags: [Church Auth]
      summary: Capture marketing lead
      operationId: captureLead
      description: Rate limited — 5 requests per 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                churchName:
                  type: string
                source:
                  type: string
      responses:
        '200':
          description: Lead captured
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  /api/referral/{code}:
    get:
      tags: [Church Auth]
      summary: Look up referral code
      operationId: getReferralCode
      description: Rate limited — 20 requests per 60 seconds.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Referral code validity
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  referrerName:
                    type: string
                    nullable: true

  /api/pf/report:
    post:
      tags: [Church Auth]
      summary: Submit Problem Finder report
      operationId: submitPfReport
      security:
        - ChurchAppBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, issueCount, autoFixedCount, coverageScore, blockerCount]
              properties:
                runId:
                  type: string
                status:
                  type: string
                  enum: [GO, NO_GO]
                issueCount:
                  type: integer
                autoFixedCount:
                  type: integer
                coverageScore:
                  type: integer
                blockerCount:
                  type: integer
                issues:
                  type: array
                  items:
                    type: object
                blockers:
                  type: array
                  items:
                    type: object
                autoFixed:
                  type: array
                  items:
                    type: object
                needsAttention:
                  type: array
                  items:
                    type: object
                topActions:
                  type: array
                  items:
                    type: object
                createdAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Report saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: saved

  # ── EMAIL VERIFICATION ────────────────────────────────────────────────────────

  /api/church/verify-email:
    get:
      tags: [Email Verification]
      summary: Verify email address via token link
      operationId: verifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to portal on success
        '400':
          description: Invalid or expired token

  /api/church/resend-verification:
    post:
      tags: [Email Verification]
      summary: Resend verification email
      operationId: resendVerification
      description: Rate limited — 3 requests per 60 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                  alreadyVerified:
                    type: boolean

  /api/church/forgot-password:
    post:
      tags: [Email Verification]
      summary: Initiate self-service password reset
      operationId: forgotPassword
      description: |
        Rate limited — 3 requests per 15 minutes.
        Always returns success to prevent email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent (always)
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean

  /api/church/reset-password-token:
    post:
      tags: [Email Verification]
      summary: Complete password reset with token
      operationId: resetPasswordToken
      description: Rate limited — 5 requests per 15 minutes. Token expires in 1 hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid or expired token

  # ── BILLING ───────────────────────────────────────────────────────────────────

  /api/billing/checkout:
    post:
      tags: [Billing]
      summary: Create Stripe checkout session
      operationId: createCheckout
      description: Rate limited — 5 requests per 60 seconds. Requires admin auth.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier, churchId, email, successUrl, cancelUrl]
              properties:
                tier:
                  type: string
                  enum: [connect, plus, pro, managed, event]
                churchId:
                  type: string
                email:
                  type: string
                  format: email
                successUrl:
                  type: string
                  format: uri
                cancelUrl:
                  type: string
                  format: uri
                billingInterval:
                  type: string
                  enum: [monthly, annual, one_time]
                  default: monthly
                isEvent:
                  type: boolean
      responses:
        '200':
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /api/billing/portal:
    post:
      tags: [Billing]
      summary: Create Stripe billing portal session
      operationId: createBillingPortal
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [churchId, returnUrl]
              properties:
                churchId:
                  type: string
                returnUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /api/billing/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      operationId: stripeWebhook
      description: |
        No authentication — Stripe signature verified via `stripe-signature` header.
        Raw body must be preserved for signature verification.
      parameters:
        - name: stripe-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid signature

  /api/billing/status/{churchId}:
    get:
      tags: [Billing]
      summary: Get billing status for a church
      operationId: getBillingStatus
      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Billing status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingStatus'

  /api/billing:
    get:
      tags: [Billing]
      summary: List all billing records
      operationId: listBillingRecords
      security:
        - AdminBearer: []
      responses:
        '200':
          description: All billing records

  # ── CHURCHES ─────────────────────────────────────────────────────────────────

  /api/churches:
    get:
      tags: [Churches]
      summary: List all churches with runtime status
      operationId: listChurches
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Church list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Church'

  /api/churches/register:
    post:
      tags: [Churches]
      summary: Register a new church (admin)
      operationId: registerChurch
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                token:
                  type: string
      responses:
        '200':
          description: Church registered

  /api/churches/{churchId}:
    get:
      tags: [Churches]
      summary: Get church details
      operationId: getChurch
      security:
        - AdminBearer: []
      parameters:
        - name: churchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
