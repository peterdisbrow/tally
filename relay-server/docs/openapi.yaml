          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AutoPilot rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  paused:
                    type: boolean
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutomationRule'
        '402':
          description: Feature not available on current tier
    post:
      tags: [Automation]
      summary: Create AutoPilot rule
      operationId: createAutomationRule
