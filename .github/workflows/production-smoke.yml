name: Production Smoke

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Relay Production Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELAY_BASE_URL: ${{ vars.RELAY_BASE_URL }}
      RELAY_ADMIN_EMAIL: ${{ secrets.RELAY_ADMIN_EMAIL }}
      RELAY_ADMIN_PASSWORD: ${{ secrets.RELAY_ADMIN_PASSWORD }}
    steps:
      - name: Resolve target URL
        run: |
          BASE_URL="${RELAY_BASE_URL:-https://api.tallyconnect.app}"
          echo "BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "Target: $BASE_URL"

      - name: Public endpoint checks
        run: |
          set -euo pipefail

          curl -fsS "$BASE_URL/api/health" -o health.json
          jq -e '
            (.uptime | type == "number")
            and (
              ((.registeredChurches // .churchesRegistered // 0) | type == "number")
            )
          ' health.json >/dev/null

          curl -fsS "$BASE_URL/api/status/components" -o components.json
          jq -e '.components | type == "array" and length > 0' components.json >/dev/null
          jq -e '[.components[] | select((((.id // "") == "relay_api") or ((.name // "") == "Relay API")) and .state == "operational")] | length > 0' components.json >/dev/null

          {
            echo "## Public checks"
            echo "- PASS: \`GET /api/health\`"
            echo "- PASS: \`GET /api/status/components\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticated endpoint checks
        id: auth_checks
        if: ${{ env.RELAY_ADMIN_EMAIL != '' && env.RELAY_ADMIN_PASSWORD != '' }}
        continue-on-error: true
        run: |
          set -euo pipefail

          TOKEN=$(curl -fsS "$BASE_URL/api/admin/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\": \"$RELAY_ADMIN_EMAIL\", \"password\": \"$RELAY_ADMIN_PASSWORD\"}" \
            | jq -re '.token')

          curl -fsS "$BASE_URL/api/churches" \
            -H "Authorization: Bearer $TOKEN" \
            -o churches.json
          jq -e 'type == "array"' churches.json >/dev/null

          curl -fsS "$BASE_URL/api/billing" \
            -H "Authorization: Bearer $TOKEN" \
            -o billing.json
          jq -e 'type == "array"' billing.json >/dev/null

          {
            echo "## Authenticated checks"
            echo "- PASS: \`POST /api/admin/login\`"
            echo "- PASS: \`GET /api/churches\`"
            echo "- PASS: \`GET /api/billing\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Auth check warning
        if: steps.auth_checks.outcome == 'failure'
        run: |
          {
            echo "## Authenticated checks"
            echo "- :warning: FAILED: admin login returned an error. Update \`RELAY_ADMIN_EMAIL\` and \`RELAY_ADMIN_PASSWORD\` repository secrets."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Authenticated smoke checks failed — update admin credentials in repository secrets"

      - name: Missing secret notice
        if: ${{ env.RELAY_ADMIN_EMAIL == '' || env.RELAY_ADMIN_PASSWORD == '' }}
        run: |
          echo "## Authenticated checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- SKIPPED: set repository secrets \`RELAY_ADMIN_EMAIL\` and \`RELAY_ADMIN_PASSWORD\` to enable authenticated smoke checks." >> "$GITHUB_STEP_SUMMARY"
