name: Tally CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: tally-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay-server:
    name: Relay Server Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: relay-server/package-lock.json

      - name: Install dependencies
        working-directory: relay-server
        run: npm ci

      - name: Run relay tests (unit + integration)
        working-directory: relay-server
        run: npm run test:all

  church-client:
    name: Church Client Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: church-client/package-lock.json

      - name: Install dependencies
        working-directory: church-client
        run: npm ci --omit=dev

      - name: Run church-client tests
        working-directory: church-client
        run: npm test

  electron-app:
    name: Electron App Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci --omit=dev

      - name: Run electron-app tests
        working-directory: electron-app
        run: npm test

  quality-gate:
    name: CI Quality Gate
    runs-on: ubuntu-latest
    needs:
      - relay-server
      - church-client
      - electron-app
    steps:
      - name: All suites passed
        run: echo "All codebase test suites passed."
