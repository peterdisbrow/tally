name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Get version
        id: version
        working-directory: electron-app
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Check signing configuration
        id: signing
        run: |
          if ("${{ secrets.WIN_CSC_LINK }}" -ne "") {
            echo "available=true" >> $env:GITHUB_OUTPUT
            echo "::notice::Windows code signing certificate found — building signed installer"
          } else {
            echo "available=false" >> $env:GITHUB_OUTPUT
            echo "::warning::No WIN_CSC_LINK secret configured — building UNSIGNED installer. Auto-update signature verification will be skipped."
          }

      - name: Build signed Windows installer
        if: steps.signing.outputs.available == 'true'
        working-directory: electron-app
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
        run: npx electron-builder --win --x64 --publish never

      - name: Build unsigned Windows installer
        if: steps.signing.outputs.available != 'true'
        working-directory: electron-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ github.token }}
        run: npx electron-builder --win --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tally-connect-win-x64
          path: electron-app/dist/*.exe
          retention-days: 30

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: electron-app/dist
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          gh release upload $tag *.exe *.blockmap latest.yml --clobber
